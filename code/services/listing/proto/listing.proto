syntax = "proto3";

package listing;
import "shared/shared.proto";
option go_package = "services/listing/proto";

service ListingService {
    // Get detailed information about a specific car listing by its ID.
    rpc GetListingDetails (ListingDetailsRequest) returns (ListingDetailsResponse);
    // Get summarized information about a specific car listing by its ID, suitable for search results.
    rpc GetListingSummary (ListingDetailsRequest) returns (shared.ListingSummary);
    // Get summarized information for multiple listings by their IDs.
    rpc GetListingSummaries (ListingSummariesRequest) returns (ListingSummariesResponse);
    // Create a new listing.
    rpc CreateListing (CreateListingRequest) returns (ListingDetailsResponse);
    // Update an existing listing (cannot update is_sold).
    rpc UpdateListing (UpdateListingRequest) returns (ListingDetailsResponse);
    // Set the sold status of a listing (only updates is_sold).
    rpc SetListingSoldStatus (SetListingSoldStatusRequest) returns (ListingDetailsResponse);
    // Delete an existing listing.
    rpc DeleteListing (DeleteListingRequest) returns (DeleteListingResponse);
    // Compare multiple car listings by their IDs to see their details side by side.
    rpc CompareListings (CompareListingsRequest) returns (CompareListingsResponse);
    // Checks if a listing with the given ID exists and belongs to a seller.
    rpc CheckListingOwnership (CheckListingOwnershipRequest) returns (CheckListingOwnershipResponse);
    // Checks if a listing with the given ID is currently open for bidding.
    rpc CheckListingOpen (CheckListingOpenRequest) returns (CheckListingOpenResponse);
}

message ListingDetailsRequest {
    int64 id = 1;
}

message ListingSummariesRequest {
    repeated int64 ids = 1;
}

message ListingSummariesResponse {
    repeated shared.ListingSummary listings = 1;
}

message ListingDetailsResponse {
    int64 id = 1;
    string make = 2;
    string model = 3;
    int32 year = 4;
    double price = 5;
    int32 mileage = 6;
    string city = 7;
    string district = 8;
    string state = 9;
    string country = 10;
    string fuel_type = 11;
    string trim = 12;
    string transmission = 13;
    string color = 14;
    string seller_type = 15;
    string description = 16;
    string listed_at = 17;
    repeated string images = 18;
    bool is_sold = 19;
}

message CreateListingRequest {
    string vin = 1;
    string make = 2;
    string model = 3;
    int32 year = 4;
    double price = 5;
    int32 mileage = 6;
    string city = 7;
    string district = 8;
    string state = 9;
    string country = 10;
    string fuel_type = 11;
    string body_class = 12;
    string drive_type = 13;
    string transmission = 14;
    string trim = 15;
    string color = 16;
    int64 dealer_id = 17;
    bool is_new = 18;
    bool is_sold = 19;
}

message UpdateListingRequest {
    int64 id = 1;
    string vin = 2;
    string make = 3;
    string model = 4;
    int32 year = 5;
    double price = 6;
    int32 mileage = 7;
    string city = 8;
    string district = 9;
    string state = 10;
    string country = 11;
    string fuel_type = 12;
    string body_class = 13;
    string drive_type = 14;
    string transmission = 15;
    string trim = 16;
    string color = 17;
    int64 dealer_id = 18;
    bool is_new = 19;
}

message SetListingSoldStatusRequest {
    int64 id = 1;
    int64 dealer_id = 2;
    bool is_sold = 3;
}

message DeleteListingRequest {
    int64 id = 1;
    int64 dealer_id = 2;
}

message DeleteListingResponse {
    bool deleted = 1;
}

message CompareListingsRequest {
    repeated int64 ids = 1;
}

message CompareListingsResponse {
    repeated ListingDetailsResponse listings = 1;
}

message CheckListingOwnershipRequest {
    int64 listing_id = 1;
    int64 dealer_id = 2;
}

message CheckListingOwnershipResponse {
    bool is_owner = 1;
}

message CheckListingOpenRequest {
    int64 listing_id = 1;
}

message CheckListingOpenResponse {
    bool is_open = 1;
    int64 dealer_id = 2;
}