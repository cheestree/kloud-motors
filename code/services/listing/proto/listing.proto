syntax = "proto3";

package listing;
import "shared/shared.proto";
option go_package = "services/listing/proto";

service ListingService {
    // Get detailed information about a specific car listing by its ID.
    rpc GetListingDetails (ListingDetailsRequest) returns (ListingDetailsResponse);
    // Get summarized information about a specific car listing by its ID, suitable for search results.
    rpc GetListingSummary (ListingDetailsRequest) returns (shared.ListingSummary);
    // Compare multiple car listings by their IDs to see their details side by side.
    rpc CompareListings (CompareListingsRequest) returns (CompareListingsResponse);
    // Checks if a listing with the given ID exists and belongs to a seller.
    rpc CheckListingOwnership (CheckListingOwnershipRequest) returns (CheckListingOwnershipResponse);
}

message ListingDetailsRequest {
    int64 id = 1;
}

message ListingDetailsResponse {
    int64 id = 1;
    string make = 2;
    string model = 3;
    int32 year = 4;
    double price = 5;
    int32 mileage = 6;
    string city = 7;
    string district = 8;
    string state = 9;
    string country = 10;
    string fuel_type = 11;
    string trim = 12;
    string transmission = 13;
    string color = 14;
    string seller_type = 15;
    string description = 16;
    string listed_at = 17;
    repeated string images = 18;
}

message CompareListingsRequest {
    repeated int64 ids = 1;
}

message CompareListingsResponse {
    repeated ListingDetailsResponse listings = 1;
}

message CheckListingOwnershipRequest {
    int64 listing_id = 1;
    int64 dealer_id = 2;
}

message CheckListingOwnershipResponse {
    bool is_owner = 1;
}