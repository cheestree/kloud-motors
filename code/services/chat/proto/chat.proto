syntax = "proto3";

package chat;
option go_package = "./proto";

service ChatService {
  rpc GetChats(GetChatsRequest) returns (GetChatsResponse);
  rpc OpenChat(OpenChatRequest) returns (OpenChatResponse);
  rpc GetChatHistory(GetChatHistoryRequest) returns (GetChatHistoryResponse);
}

message GetChatsRequest {
  int64 user_id = 1;
}

message GetChatsResponse {
  repeated ChatsSummary chats = 1;
}

message ChatsSummary {
  string chat_id = 1;
  int64 listing_id = 2;
  string brand = 3;
  string model = 4;
}

message OpenChatRequest {
  int64 user_id = 1;
  int64 seller_id = 2;
  int64 listing_id = 3;
}

message OpenChatResponse {
  string chat_id = 1;
  bool is_chat_closed = 2;
}

message GetChatHistoryRequest {
  string chat_id = 1;
  int64 user_id = 2;
  int32 limit = 3;
  int32 skip = 4;
}

message GetChatHistoryResponse {
  repeated ChatMessage messages = 1;
  Pagination pagination = 2;
}

message ChatMessage {
  int64 sender_id = 1;
  string content = 2;
  int64 timestamp = 3;
}

message Pagination {
  int32 limit = 1;
  int32 skip = 2;
  bool has_next = 3;
  optional int32 next_skip = 4;
}