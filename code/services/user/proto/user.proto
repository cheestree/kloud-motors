syntax = "proto3";

package user;
option go_package = "./proto";

service UserService {
    rpc Login (AuthRequest) returns (AuthResponse);
    rpc Register (AuthRequest) returns (AuthResponse);
    rpc RefreshToken (RefreshTokenRequest) returns (AuthResponse);
    rpc GetFavorites (GetFavoritesRequest) returns (FavoritesResponse);
    rpc AddFavorite (AddFavoriteRequest) returns (FavoriteMutationResponse);
    rpc RemoveFavorite (RemoveFavoriteRequest) returns (FavoriteMutationResponse);
    rpc GetUsersPreview (UsersPreviewRequest) returns (UsersPreviewResponse);
    rpc CreateUserProfile (CreateUserProfileRequest) returns (CreateUserProfileResponse);
    rpc GetOrCreateByFirebaseUID (GetOrCreateByFirebaseUIDRequest) returns (GetOrCreateByFirebaseUIDResponse);
}

message AuthRequest {
  string email = 1;
  string password = 2;
}

message AuthResponse {
  string id_token = 1;
  string email = 2;
  string refresh_token = 3;
  string expires_in = 4;
  string local_id = 5;
  int64 user_id = 6;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message GetOrCreateByFirebaseUIDRequest {
  string firebase_uid = 1;
  string email = 2;
  string name = 3;
}

message GetOrCreateByFirebaseUIDResponse {
  int64 user_id = 1;
}

message CreateUserProfileRequest {
  int64 user_id = 1;
  string name = 2;
  string email = 3;
}

message CreateUserProfileResponse {
    bool success = 1;
}

message GetFavoritesRequest {
  int64 user_id = 1;
}

message FavoritesResponse {
  repeated int64 favorites = 1;
}

message AddFavoriteRequest {
  int64 user_id = 1;
  int64 listing_id = 2;
}

message RemoveFavoriteRequest {
  int64 user_id = 1;
  int64 listing_id = 2;
}

message FavoriteMutationResponse {
  bool success = 1;
  string message = 2;
}

message UsersPreviewRequest {
  repeated int64 user_ids = 1;
}

message UserPreview {
  int64 id = 1;
  string name = 2;
}

message UsersPreviewResponse {
    repeated UserPreview users = 1;
}
