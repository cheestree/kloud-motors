syntax = "proto3";

package user;
option go_package = "./proto";

service UserService {
    rpc GetFavorites (GetFavoritesRequest) returns (FavoritesResponse);
    rpc AddFavorite (AddFavoriteRequest) returns (FavoriteMutationResponse);
    rpc RemoveFavorite (RemoveFavoriteRequest) returns (FavoriteMutationResponse);
    rpc GetUsersPreview (UsersPreviewRequest) returns (UsersPreviewResponse);
    rpc CreateUserProfile (CreateUserProfileRequest) returns (CreateUserProfileResponse);
}

message CreateUserProfileRequest {
    int64 user_id = 1;
    string name = 2;
    string email = 3;
}

message CreateUserProfileResponse {
    bool success = 1;
}

message GetFavoritesRequest {
    int64 user_id = 1;
}

message FavoritesResponse {
    repeated int64 favorites = 1;
}

message AddFavoriteRequest {
    int64 user_id = 1;
    int64 listing_id = 2;
}

message RemoveFavoriteRequest {
    int64 user_id = 1;
    int64 listing_id = 2;
}

message FavoriteMutationResponse {
    bool success = 1;
    string message = 2;
}

message UsersPreviewRequest {
    repeated int64 user_ids = 1;
}

message UserPreview {
    int64 id = 1;
    string name = 2;
}

message UsersPreviewResponse {
    repeated UserPreview users = 1;
}
