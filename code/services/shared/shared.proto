syntax = "proto3";

package shared;
option go_package = "services/shared";

message ListingSummary {
    int64 id = 1;
    string make = 2;
    string model = 3;
    int32 year = 4;
    float price = 5;
    int32 mileage = 6;
    string fuel_type = 7;
    string body_class = 8;
    string drive_type = 9;
    string transmission = 10;
    bool is_new = 11;
    string city = 12;
    string district = 13;
    string state = 14;
    string country = 15;
    string last_seen = 16;
    bool is_sold = 17;
    int32 dealer_id = 18;
}

message ListingDetails {
    int64 id = 1;
    string vin = 2;
    string make = 3;
    string model = 4;
    int32 year = 5;
    float price = 6;
    int32 mileage = 7;
    string fuel_type = 8;
    string body_class = 9;
    string drive_type = 10;
    string transmission = 11;
    bool is_new = 12;
    string city = 13;
    string district = 14;
    string state = 15;
    string country = 16;
    string trim = 17;
    string color = 18;
    string seller_type = 19;
    string description = 20;
    repeated string images = 21;
    string last_seen = 22;
    bool is_sold = 23;
}
