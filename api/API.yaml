      tags:
      - Users
      summary: Register a user with email and password
      description: |
        Creates a Firebase Auth user and returns tokens plus the internal
        Kloud Motors user id.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
