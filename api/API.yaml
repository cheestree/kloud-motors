      - "$ref": "#/components/parameters/MaxPriceQuery"
      - "$ref": "#/components/parameters/MaxMileageQuery"
      - "$ref": "#/components/parameters/FuelTypeCamelQuery"
      - "$ref": "#/components/parameters/PageQuery"
      - "$ref": "#/components/parameters/PageSizeCamelQuery"
      - "$ref": "#/components/parameters/IncludeSoldQuery"
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SearchResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
  "/api/listings/compare":
    get:
      tags:
      - Listings
      summary: Compare listings
      operationId: compareListings
      parameters:
      - "$ref": "#/components/parameters/IdsQuery"
      responses:
        '200':
          description: Listing comparison.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CompareListingsResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '404':
          "$ref": "#/components/responses/NotFoundText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
  "/api/listings/{id}":
    get:
      tags:
      - Listings
      summary: Get listing details
      operationId: getCarById
      parameters:
      - "$ref": "#/components/parameters/ListingIdPlainPath"
      responses:
        '200':
          description: Listing details.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListingDetailsResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '404':
          "$ref": "#/components/responses/NotFoundText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
    put:
      tags:
      - Listings
      summary: Update a listing
      operationId: updateListing
      security:
      - bearerAuth: []
      parameters:
      - "$ref": "#/components/parameters/ListingIdPlainPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UpdateListingRequest"
      responses:
        '200':
          description: Listing updated.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListingDetailsResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '401':
          "$ref": "#/components/responses/UnauthorizedText"
        '404':
          "$ref": "#/components/responses/NotFoundText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '409':
          "$ref": "#/components/responses/ConflictText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
    delete:
      tags:
      - Listings
      summary: Delete a listing
      operationId: deleteListing
      security:
      - bearerAuth: []
      parameters:
      - "$ref": "#/components/parameters/ListingIdPlainPath"
      responses:
        '204':
          description: Listing deleted.
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '401':
          "$ref": "#/components/responses/UnauthorizedText"
        '404':
          "$ref": "#/components/responses/NotFoundText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID token
  parameters:
    AuctionIdPath:
      name: auction_id
      in: path
      required: true
      schema:
        type: string
    ChatIdPath:
      name: chat_id
      in: path
      required: true
      schema:
        type: string
    ListingIdPath:
      name: listing_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ListingIdPlainPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    SellerIdPath:
      name: seller_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    AuctionStatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
    BrandQuery:
      name: brand
      in: query
      required: false
      schema:
        type: string
    BrandQueryRequired:
      name: brand
      in: query
      required: true
      schema:
        type: string
    FuelTypeCamelQuery:
      name: fuelType
      in: query
      required: false
      schema:
        type: string
    FuelTypeSnakeQuery:
      name: fuel_type
      in: query
      required: false
      schema:
        type: string
    GroupByQuery:
      name: group_by
      in: query
      required: false
      schema:
        type: string
        enum:
        - district
        - city
        - country
        default: district
    IdsQuery:
      name: ids
      in: query
      required: true
      description: Comma-separated listing IDs. Invalid numbers are parsed as 0 by
        the gateway.
      schema:
        type: string
        example: 123
    IncludeSoldQuery:
      name: includeSold
      in: query
      required: false
      schema:
        type: boolean
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        format: int32
    LocationQuery:
      name: location
      in: query
      required: false
      schema:
        type: string
    LocationsQuery:
      name: locations
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
    MakeQuery:
      name: make
      in: query
      required: false
      schema:
        type: string
    MaxMileageQuery:
      name: maxMileage
      in: query
      required: false
      schema:
        type: integer
        format: int32
    MaxPriceQuery:
      name: maxPrice
      in: query
      required: false
      schema:
        type: integer
        format: int64
    MetricsQuery:
      name: metrics
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          enum:
          - avg_price
          - median_price
          - count
    MinPriceQuery:
      name: minPrice
      in: query
      required: false
      schema:
        type: integer
        format: int64
    ModelQuery:
      name: model
      in: query
      required: false
      schema:
        type: string
    ModelQueryRequired:
      name: model
      in: query
      required: true
      schema:
        type: string
    OrderQuery:
      name: order
      in: query
      required: false
      schema:
        type: string
        enum:
        - asc
        - desc
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 1
    PageSizeCamelQuery:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 20
    PageSizeSnakeQuery:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 20
    SkipQuery:
      name: skip
      in: query
      required: false
      schema:
        type: integer
        format: int32
    SortByQuery:
      name: sort_by
      in: query
      required: false
      schema:
        type: string
        enum:
        - avg_price
        - count
    YearQuery:
      name: year
      in: query
      required: false
      schema:
        type: integer
        format: int32
    YearFromQuery:
      name: year_from
      in: query
      required: false
      schema:
        type: integer
        format: int32
    YearToQuery:
      name: year_to
      in: query
      required: false
      schema:
        type: integer
        format: int32
  responses:
    BadGatewayText:
      description: Upstream service is unavailable or could not be reached.
      content:
        text/plain:
          schema:
            type: string
    BadRequestText:
      description: Bad request.
      content:
        text/plain:
          schema:
            type: string
    ConflictText:
      description: Conflict.
      content:
        text/plain:
          schema:
            type: string
    ForbiddenText:
      description: Forbidden.
      content:
        text/plain:
          schema:
            type: string
    InternalServerErrorText:
      description: Internal server error.
      content:
        text/plain:
          schema:
            type: string
    MethodNotAllowedText:
      description: Method not allowed.
      content:
        text/plain:
          schema:
            type: string
            example: Method not allowed
    NotFoundText:
      description: Not found.
      content:
        text/plain:
          schema:
            type: string
            example: Not found
    UnauthorizedText:
      description: Unauthorized.
      content:
        text/plain:
          schema:
            type: string
            example: Unauthorized
  schemas:
    Aggregates:
      type: object
      properties:
        location:
          type: string
        avg_price:
          type: integer
          format: int32
        median_price:
          type: integer
          format: int32
        count:
          type: integer
          format: int32
    AggregatesResponse:
      type: object
      properties:
        aggregates:
          type: array
          items:
            "$ref": "#/components/schemas/Aggregates"
        pagination:
          "$ref": "#/components/schemas/Pagination"
    Auction:
      type: object
      properties:
        auction_id:
          type: string
        listing_id:
          type: integer
          format: int64
        seller_id:
          type: integer
          format: int64
        starting_price:
          type: number
          format: double
        current_price:
          type: number
          format: double
          nullable: true
        status:
          type: string
        end_time:
          type: string
        winner_user_id:
          type: string
          nullable: true
        created_at:
          type: string
        reserve_met:
          type: boolean
        total_bids:
          type: integer
          format: int32
    AveragePriceResponse:
      type: object
      properties:
        brand:
          type: string
        model:
          type: string
        average_price:
          type: number
          format: double
        min_price:
          type: number
          format: double
        max_price:
          type: number
          format: double
        listing_count:
          type: integer
          format: int32
    Bid:
      type: object
      properties:
        bid_id:
          type: string
        auction_id:
          type: string
        bidder_id:
          type: string
        bid_amount:
          type: number
          format: double
        timestamp:
          type: string
    ByLocationResponse:
      type: object
      properties:
        stats:
          "$ref": "#/components/schemas/Stats"
    ChatMessage:
      type: object
      properties:
        sender_id:
          type: integer
          format: int64
        content:
          type: string
        timestamp:
          type: integer
          format: int64
    ChatsSummary:
      type: object
      properties:
        chat_id:
          type: string
        listing_id:
          type: integer
          format: int64
        brand:
          type: string
        model:
          type: string
    Comparisons:
      type: object
      properties:
        location:
          type: string
        average_price:
          type: integer
          format: int32
        listing_count:
          type: integer
          format: int32
    CompareListingsResponse:
      type: object
      properties:
        listings:
          type: array
          items:
            "$ref": "#/components/schemas/ListingDetailsResponse"
    CreateAuctionRequest:
      type: object
      properties:
        listing_id:
          type: integer
          format: int64
        seller_id:
          type: integer
          format: int64
          readOnly: true
          description: Overwritten from the authenticated user by the gateway.
        starting_price:
          type: number
          format: double
        end_time:
          type: string
        reserve_price:
          type: number
          format: double
          nullable: true
    CreateAuctionResponse:
      type: object
      properties:
        auction:
          "$ref": "#/components/schemas/Auction"
    CreateListingRequest:
      type: object
      properties:
        vin:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
          format: int32
        price:
          type: number
          format: double
        mileage:
          type: integer
          format: int32
        city:
          type: string
        district:
          type: string
        state:
          type: string
        country:
          type: string
        fuel_type:
          type: string
        body_class:
          type: string
        drive_type:
          type: string
        transmission:
          type: string
        trim:
          type: string
        color:
          type: string
        seller_id:
          type: integer
          format: int64
          readOnly: true
          description: Overwritten from the authenticated user by the gateway.
        is_new:
          type: boolean
        is_sold:
          type: boolean
    FavoriteMutationResponse:
      type: object
      properties:
        success:
          type: boolean
