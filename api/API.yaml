openapi: 3.0.3
info:
  title: Car Marketplace API
  version: 1.0.0
  description: |
    - **Market Price Analysis**: Calculate the average price of cars based on brand, model, year, and location.
    - **Filtered Search**: Allow users to search for cars based on specific criteria(make, model, year, price range, mileage, fuel type, location).
    - **Geographical Market Insights**: Analyze car availability and price variations across different regions.
    - **Seller Management & Profiling**: Distinguish between professional dealers and private sellers.
    - **Buyer–Seller Communication**: Enable real-time messaging between the buyer and the seller of a specific listing.
    - **Visitor & User Registration**: Track and register platform visitors, registered users can save favourite listings.
    - **Auction Module**: Allow sellers to list cars under an auction format.
    - **Listing details and comparison**: Provide detailed information on each listing and allow users to compare multiple listings side by side based on price, mileage, year and location.

tags:
  - name: Chat
    description: Buyer-Seller communication endpoints
  - name: Geographical Market Insights
    description: Geographical market insights and listing aggregation
  - name: Market Price Analysis
    description: Endpoints for average car prices
  - name: Auction
    description: Endpoints for car auction listings
  - name: Users
    description: User profiles and favorite listings
  - name: Sellers
    description: Seller management and profiling
  - name: Listings
    description: Filtered car search and listing comparison

paths:
  /api/chat:
    get:
      tags: [Chat]
      summary: Get user chats
      description: Retrieve a list of all active chat sessions for the authenticated user.
      operationId: getChats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of chats retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  chats:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChatPreview'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/chat/open:
    post:
      tags: [Chat]
      summary: Open or create a buyer-seller chat session
      description: Enables messaging between a buyer and a seller for a specific listing.
      operationId: openChat
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenChatRequest'
      responses:
        '200':
          description: Chat session opened successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenChatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/chat/{chat_id}:
    get:
      tags: [Chat]
      summary: Get chat history
      description: Retrieves message history for a specific chat session with pagination.
      operationId: getChatHistory
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatIdPath'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/SkipQuery'
      responses:
        '200':
          description: Chat history retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatHistoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/chat/ws/{chat_id}:
    get:
      tags: [Chat]
      summary: WebSocket chat endpoint
      description: WebSocket endpoint for real-time messaging in an active chat session.
      operationId: connectChatWebSocket
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatIdPath'
      responses:
        '101':
          description: Switching Protocols (WebSocket upgrade)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/market/insights/aggregates:
    get:
      tags: [Geographical Market Insights]
      summary: Get aggregated market insights
      description: Returns aggregated market metrics for a specific car model, grouped by location level.
      operationId: getMarketInsightsAggregates
      parameters:
        - $ref: '#/components/parameters/BrandQuery'
        - $ref: '#/components/parameters/ModelQuery'
        - $ref: '#/components/parameters/MetricsQuery'
        - $ref: '#/components/parameters/GroupByLocationQuery'
        - $ref: '#/components/parameters/LocationsQuery'
        - $ref: '#/components/parameters/YearFromQuery'
        - $ref: '#/components/parameters/YearToQuery'
        - $ref: '#/components/parameters/FuelTypeQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/SkipQuery'
      responses:
        '200':
          description: Aggregated market insights retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingsAggregateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/market/price-comparison:
    get:
      tags: [Geographical Market Insights]
      summary: Compare prices across locations
      description: Provides price comparison grouped by district, city or country for a specific car model, with optional sorting and limiting.
      operationId: getPriceComparison
      parameters:
        - $ref: '#/components/parameters/BrandQuery'
        - $ref: '#/components/parameters/ModelQuery'
        - $ref: '#/components/parameters/GroupByDistrictCityCountryQuery'
        - $ref: '#/components/parameters/SortByQuery'
        - $ref: '#/components/parameters/OrderQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/SkipQuery'
      responses:
        '200':
          description: Price comparison retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceComparisonResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'


  /api/listings/stats/by-location:
    get:
      tags: [Geographical Market Insights]
      summary: Get listing price statistics by location
      description: Returns minimum, maximum, average and median price for a model in a selected location.
      operationId: getListingStatsByLocation
      parameters:
        - $ref: '#/components/parameters/BrandQuery'
        - $ref: '#/components/parameters/ModelQuery'
        - $ref: '#/components/parameters/LocationQuery'
        - $ref: '#/components/parameters/YearFromQuery'
        - $ref: '#/components/parameters/YearToQuery'
        - $ref: '#/components/parameters/FuelTypeQuery'
      responses:
        '200':
          description: Statistics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingStatsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/market/average-price:
    get:
      tags: [Market Price Analysis]
      summary: Get average market price for a specific car
      description: Retrieve the average market price for a specific car make, model, year and location.
      operationId: getAverageMarketPrice
      parameters:
        - $ref: '#/components/parameters/BrandQuery'
        - $ref: '#/components/parameters/ModelQuery'
        - $ref: '#/components/parameters/YearFromQuery'
        - $ref: '#/components/parameters/YearToQuery'
      responses:
        '200':
          description: Average market price retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AveragePriceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auctions:
    get:
      tags: [Auction]
      summary: List auctions
      description: Returns a paginated list of car auctions, filterable by status, brand, model and location.
      operationId: listAuctions
      parameters:
        - $ref: '#/components/parameters/AuctionStatusQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: List of auctions retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuctionListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Auction]
      summary: Create an auction listing
      description: Allows a seller to create an auction for a car listing.
      operationId: createAuction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuctionRequest'
      responses:
        '201':
          description: Auction created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuctionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auctions/{auction_id}:
    get:
      tags: [Auction]
      summary: Get auction details
      operationId: getAuction
      parameters:
        - $ref: '#/components/parameters/AuctionIdPath'
      responses:
        '200':
          description: Auction retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuctionResponse'
        '404':
          description: Auction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Auction]
      summary: Delete an auction listing
      operationId: deleteAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AuctionIdPath'
      responses:
        '204':
          description: Auction deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Auction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auctions/{auction_id}/bid:
    post:
      tags: [Auction]
      summary: Place a bid
      operationId: placeBid
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AuctionIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BidRequest'
      responses:
        '200':
          description: Bid placed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Auction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auctions/{auction_id}/bids:
    get:
      tags: [Auction]
      summary: Get auction bids
      operationId: getAuctionBids
      parameters:
        - $ref: '#/components/parameters/AuctionIdPath'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: List of bids
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidsResponse'
        '404':
          description: Auction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
          
  /api/auctions/ws/{auction_id}:
    get:
      tags: [Auction]
      summary: Ligar ao WebSocket do leilão
      description: Endpoint para receber as atualizações de licitações em tempo real para um leilão específico. Requer o upgrade de protocolo para WebSocket (ws://).
      operationId: connectAuctionWebSocket
      security:
        - bearerAuth: []
      parameters:
        - name: auction_id
          in: path
          required: true
          schema:
            type: string
          description: O ID único do leilão
      responses:
        '101':
          description: Switching Protocols (WebSocket upgrade efetuado com sucesso)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/me/favorites:
    get:
      tags: [Users]
      summary: Get user's favorite listings
      description: Retrieve all listings the authenticated user has saved for later.
      operationId: getFavoriteListings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Favorite listings retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoritesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/me/favorites/{listing_id}:
    post:
      tags: [Users]
      summary: Save a listing to favorites
      description: Save a specific listing for later. User must be registered and logged in.
      operationId: addFavoriteListing
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ListingIdPath'
      responses:
        '200':
          description: Listing saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Listing already in favorites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Users]
      summary: Remove a listing from favorites
      description: Remove a previously saved listing from the user's favorites.
      operationId: removeFavoriteListing
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ListingIdPath'
      responses:
        '200':
          description: Listing removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/preview:
    post:
      tags: [Users]
      summary: Get user previews
      description: Retrieve basic user info (name) for a list of user IDs.
      operationId: getUsersPreview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsersPreviewRequest'
      responses:
        '200':
          description: User previews retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersPreviewResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/sellers/{seller_id}:
    get:
      tags: [Sellers]
      summary: Get seller profile and categorization
      description: Retrieve information about a seller, including whether they are a professional dealer or a private seller.
      operationId: getSellerProfile
      parameters:
        - $ref: '#/components/parameters/SellerIdPath'
      responses:
        '200':
          description: Seller profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SellerProfileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/sellers/preview:
    post:
      tags: [Sellers]
      summary: Get sellers preview
      description: Retrieve basic profile information for a batch of seller IDs.
      operationId: getSellersPreview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [seller_ids]
              properties:
                seller_ids:
                  type: array
                  items:
                    type: integer
                    format: int64
      responses:
        '200':
          description: List of seller previews
          content:
            application/json:
              schema:
                type: object
                properties:
                  sellers:
                    type: array
                    items:
                      $ref: '#/components/schemas/SellerPreview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'


  /api/listings/search:
    get:
      tags: [Listings]
      summary: Filtered car search
      description: Search for car listings using filters such as mileage, price range, make, model, year, and fuel type.
      operationId: searchCars
      parameters:
        - $ref: '#/components/parameters/IncludeSoldQuery'
        - name: make
          in: query
          description: Car manufacturer (e.g. Toyota, Ford)
          schema:
            type: string
        - name: model
          in: query
          description: Car model (e.g. Corolla, Mustang)
          schema:
            type: string
        - name: year
          in: query
          description: Manufacturing year
          schema:
            type: integer
        - name: minPrice
          in: query
          description: Minimum price in USD
          schema:
            type: number
            format: float
        - name: maxPrice
          in: query
          description: Maximum price in USD
          schema:
            type: number
            format: float
        - name: maxMileage
          in: query
          description: Maximum mileage in miles
          schema:
            type: integer
        - name: fuelType
          in: query
          description: Fuel type (e.g. gasoline, diesel, electric)
          schema:
            type: string
            enum: [gasoline, diesel, hybrid, electric]
        - name: location
          in: query
          description: City or region to filter listings by
          schema:
            type: string
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          description: Number of results per page
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: A paginated list of car listings matching the filters
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    type: integer
                    description: Total number of matching listings
                  current_page:
                    type: integer
                  total_pages:
                    type: integer
                  listings:
                    type: array
                    items:
                      $ref: '#/components/schemas/CarSummary'
        '400':
          description: Invalid query parameters

  /api/listings/compare:
    get:
      tags: [Listings]
      summary: Compare multiple listings
      description: Retrieve and compare multiple car listings side by side based on price, mileage, year, and location.
      operationId: compareListings
      parameters:
        - name: ids
          in: query
          required: true
          description: Comma-separated list of listing IDs to compare
          schema:
            type: string
            example: abc123,def456,ghi789
      responses:
        '200':
          description: Comparison data for the requested listings
          content:
            application/json:
              schema:
                type: object
                properties:
                  listings:
                    type: array
                    items:
                      $ref: '#/components/schemas/CarListing'
        '400':
          description: Missing or invalid IDs parameter
        '404':
          description: One or more listings not found
  /api/listings:
    post:
      tags: [Listings]
      summary: Create a new listing
      description: Create a new car listing.
      operationId: createListing
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarListing'
      responses:
        '201':
          description: Listing created successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags: [Listings]
      summary: Get all listings
      description: Retrieve a paginated list of all listings.
      operationId: getListings
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
        - $ref: '#/components/parameters/IncludeSoldQuery'
      responses:
        '200':
          description: A paginated list of car listings
          content:
            application/json:
              schema:
                type: object
                properties:
                  listings:
                    type: array
                    items:
                      $ref: '#/components/schemas/CarSummary'

  /api/listings/{id}:
    get:
      tags: [Listings]
      summary: Get listing details
      description: Retrieve full details for a specific car listing.
      operationId: getCarById
      parameters:
        - name: id
          in: path
          required: true
          description: Unique listing identifier
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Full details of the car listing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarListing'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Listings]
      summary: Update a listing
      description: Update an existing car listing.
      operationId: updateListing
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarListing'
      responses:
        '200':
          description: Listing updated successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Listings]
      summary: Delete a listing
      description: Delete a specific car listing.
      operationId: deleteListing
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Listing deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Firebase ID token

  parameters:
    ListingIdPath:
      name: listing_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Car listing ID

    SellerIdPath:
      name: seller_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Seller ID

    ChatIdPath:
      name: chat_id
      in: path
      required: true
      schema:
        type: string
      description: Chat session ID

    AuctionIdPath:
      name: auction_id
      in: path
      required: true
      schema:
        type: string
      description: Unique auction identifier

    BrandQuery:
      name: brand
      in: query
      required: true
      schema:
        type: string
      description: Car brand (e.g., Toyota)

    ModelQuery:
      name: model
      in: query
      required: true
      schema:
        type: string
      description: Car model (e.g., Corolla)

    BrandQueryOptional:
      name: brand
      in: query
      required: false
      schema:
        type: string
      description: Car brand filter (e.g., Toyota)

    ModelQueryOptional:
      name: model
      in: query
      required: false
      schema:
        type: string
      description: Car model filter (e.g., Corolla)

    LocationQuery:
      name: location
      in: query
      required: false
      schema:
        type: string
      description: District, city or region filter

    LocationsQuery:
      name: locations
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
      description: Optional list of districts/cities for comparison

    YearFromQuery:
      name: year_from
      in: query
      required: false
      schema:
        type: integer
        minimum: 1886
      description: Minimum model year filter

    YearToQuery:
      name: year_to
      in: query
      required: false
      schema:
        type: integer
        minimum: 1886
      description: Maximum model year filter

    FuelTypeQuery:
      name: fuel_type
      in: query
      required: false
      schema:
        type: string
      description: Fuel type filter (e.g., Gasoline)

    GroupByDistrictCityCountryQuery:
      name: group_by
      in: query
      required: true
      schema:
        type: string
        enum: [district, city, country]
      description: Grouping field for comparison

    SortByQuery:
      name: sort_by
      in: query
      required: false
      schema:
        type: string
        enum: [avg_price, count]
      description: Sort field

    OrderQuery:
      name: order
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
      description: Sort order

    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: Maximum number of groups to return

    SkipQuery:
      name: skip
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
      description: Number of groups to skip for pagination

    MetricsQuery:
      name: metrics
      in: query
      required: true
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          enum: [avg_price, median_price, count]
      description: Metrics to aggregate

    GroupByLocationQuery:
      name: group_by
      in: query
      required: true
      schema:
        type: string
        enum: [district, city, country]
      description: Grouping field for aggregation

    AuctionStatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [ACTIVE, COMPLETED, CANCELLED]
      description: Filter by auction status

    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number for pagination

    PageSizeQuery:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Number of results per page

    IncludeSoldQuery:
      name: includeSold
      in: query
      required: false
      schema:
        type: boolean
      description: Indicates whether to include sold vehicles in the search results

  responses:
    BadRequest:
      description: Invalid input/query parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: User not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: User does not have permission to access this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Server error while processing the request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    FavoritesResponse:
      type: object
      required: [favorites]
      properties:
        favorites:
          type: array
          items:
            type: integer
            format: int64
            description: Car listing ID

    FavoriteMutationResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    UsersPreviewRequest:
      type: object
      required: [user_ids]
      properties:
        user_ids:
          type: array
          items:
            type: integer
            format: int64

    UsersPreviewResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            type: object
            required: [id, name]
            properties:
              id:
                type: integer
                format: int64
              name:
                type: string

    SellerProfileResponse:
      type: object
      required: [seller_id, name, seller_type, contact_info, rating]
      properties:
        seller_id:
          type: integer
          format: int64
        name:
          type: string
        seller_type:
          type: string
        contact_info:
          type: string
        rating:
          type: number
          format: double

    SellerPreview:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    OpenChatRequest:
      type: object
      required: [seller_id, listing_id]
      properties:
        seller_id:
          type: integer
          format: int64
          description: Seller ID
        listing_id:
          type: integer
          format: int64
          description: Car listing ID

    OpenChatResponse:
      type: object
      required: [chat_id]
      properties:
        chat_id:
          type: string
          description: Chat session ID
        is_chat_closed:
          type: boolean
          description: Indicates if the chat session has been closed by the seller

    ChatPreview:
      type: object
      properties:
        chat_id:
          type: string
        other_user_id:
          type: integer
          format: int64
        other_user_name:
          type: string
        listing_id:
          type: integer
          format: int64
        last_message:
          type: string
        updated_at:
          type: integer
          format: int64
          description: Timestamp in Unix milliseconds
        unread:
          type: boolean

    Message:
      type: object
      required: [message_id, chat_id, sender_id, content, timestamp]
      properties:
        message_id:
          type: string
        chat_id:
          type: string
        sender_id:
          type: integer
          format: int64
        content:
          type: string
        timestamp:
          type: integer
          format: int64
          description: Timestamp in Unix milliseconds
        is_read:
          type: boolean

    ChatHistoryResponse:
      type: object
      required: [messages, pagination]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'

    PriceComparison:
      type: object
      required: [location, average_price, listing_count]
      properties:
        location:
          type: string
        average_price:
          type: number
          format: float
        listing_count:
          type: integer

    PriceComparisonResponse:
      type: object
      required: [comparisons, pagination]
      properties:
        comparisons:
          type: array
          items:
            $ref: '#/components/schemas/PriceComparison'
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'

    ListingsAggregateItem:
      type: object
      required: [location]
      properties:
        location:
          type: string
        avg_price:
          type: number
          format: float
          nullable: true
        median_price:
          type: number
          format: float
          nullable: true
        count:
          type: integer
          nullable: true
      additionalProperties: false

    ListingsAggregateResponse:
      type: object
      required: [aggregates, pagination]
      properties:
        aggregates:
          type: array
          items:
            $ref: '#/components/schemas/ListingsAggregateItem'
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'

    ListingStats:
      type: object
      required: [min_price, max_price, avg_price, median_price]
      properties:
        min_price:
          type: number
          format: float
        max_price:
          type: number
          format: float
        avg_price:
          type: number
          format: float
        median_price:
          type: number
          format: float

    ListingStatsResponse:
      type: object
      required: [stats]
      properties:
        stats:
          $ref: '#/components/schemas/ListingStats'

    PaginationMetadata:
      type: object
      required: [limit, skip, has_next]
      properties:
        limit:
          type: integer
          minimum: 1
          description: Maximum number of items requested for this page.
        skip:
          type: integer
          minimum: 0
          description: Number of items skipped before this page.
        has_next:
          type: boolean
          description: Indicates whether there is a next page.
        next_skip:
          type: integer
          minimum: 0
          nullable: true
          description: Skip value to request the next page, or null when there is no next page.

    AveragePriceResponse:
      type: object
      required: [average_price, listing_count]
      properties:
        brand:
          type: string
        model:
          type: string
        average_price:
          type: number
          format: float
          description: Average listing price in USD
        min_price:
          type: number
          format: float
          description: Lowest price in matching listings
        max_price:
          type: number
          format: float
          description: Highest price in matching listings
        listing_count:
          type: integer
          description: Number of listings used to calculate the average

    CreateAuctionRequest:
      type: object
      required: [listing_id, starting_price, end_time]
      properties:
        listing_id:
          type: integer
          format: int64
          description: ID of the existing car listing to auction
        seller_id:
          type: integer
          format: int64
          description: Optional seller ID (calculated from auth if omitted)
        starting_price:
          type: number
          format: float
          description: Minimum starting bid in USD
          minimum: 0.01
        reserve_price:
          type: number
          format: float
          nullable: true
          description: Optional minimum acceptable sale price (kept private until met)
        end_time:
          type: string
          format: date-time
          description: When the auction ends, must be a future date-time

    AuctionListResponse:
      type: object
      required: [auctions]
      properties:
        total:
          type: integer
          description: Total number of matching auctions
        page:
          type: integer
        page_size:
          type: integer
        auctions:
          type: array
          items:
            $ref: '#/components/schemas/Auction'

    AuctionResponse:
      type: object
      required: [auction]
      properties:
        auction:
          $ref: '#/components/schemas/Auction'

    Auction:
      type: object
      required: [auction_id, listing_id, seller_id, starting_price, status, end_time, created_at, reserve_met, total_bids]
      properties:
        auction_id:
          type: string
        listing_id:
          type: integer
          format: int64
        seller_id:
          type: integer
          format: int64
        starting_price:
          type: number
          format: float
        reserve_met:
          type: boolean
          description: Whether the current highest bid has met the reserve price
        current_price:
          type: number
          format: float
          nullable: true
          description: Current highest bid, null if no bids placed yet
        total_bids:
          type: integer
        status:
          type: string
          enum: [ACTIVE, COMPLETED, CANCELLED]
        end_time:
          type: string
          format: date-time
        winner_user_id:
          type: string
          nullable: true
          description: Winning bidder user ID, populated only after auction ends
        created_at:
          type: string
          format: date-time

    BidRequest:
      type: object
      required: [bid_amount]
      properties:
        bidder_id:
          type: string
          description: Optional bidder ID (calculated from auth if omitted)
        bid_amount:
          type: number
          format: float
          description: Bid amount in USD, must be greater than the current highest bid
          minimum: 0.01

    BidResponse:
      type: object
      required: [bid]
      properties:
        bid:
          $ref: '#/components/schemas/Bid'

    Bid:
      type: object
      required: [bid_id, auction_id, bidder_id, bid_amount, timestamp]
      properties:
        bid_id:
          type: string
        auction_id:
          type: string
        bidder_id:
          type: string
        bid_amount:
          type: number
          format: float
        timestamp:
          type: string
          format: date-time

    BidsResponse:
      type: object
      required: [bids]
      properties:
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        bids:
          type: array
          items:
            $ref: '#/components/schemas/Bid'

    CarSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        price:
          type: integer
          format: int64
        mileage:
          type: integer
        location:
          type: string
        fuel_type:
          type: string

    CarListing:
      allOf:
        - $ref: '#/components/schemas/CarSummary'
        - type: object
          properties:
            transmission:
              type: string
              enum: [automatic, manual]
            color:
              type: string
            sellerType:
              type: string
              enum: [dealer, private]
            description:
              type: string
            listedAt:
              type: string
              format: date-time
            is_sold:
              type: boolean
              description: Indicates if the car has already been sold
            dealer_id:
              type: integer
              format: int64
              description: The ID of the seller/dealer

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message
        code:
          type: string
          description: Optional machine-readable error code
        details:
          type: object
          additionalProperties: true
          description: Optional error details
