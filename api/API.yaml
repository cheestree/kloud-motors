        country:
          type: string
        fuel_type:
          type: string
        body_class:
          type: string
        drive_type:
          type: string
        transmission:
          type: string
        trim:
          type: string
        color:
          type: string
        seller_id:
          type: integer
          format: int64
          readOnly: true
          description: Overwritten from the authenticated user by the gateway.
        is_new:
          type: boolean
    UserPreview:
      type: object
      properties:
        id:
          type: integer
          format: int64
