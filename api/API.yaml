          type: string
    FavoritesResponse:
      type: object
      properties:
        favorites:
          type: array
          items:
            type: integer
            format: int64
    AuthRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    RefreshTokenRequest:
      type: object
      required:
      - refresh_token
      properties:
        refresh_token:
          type: string
          description: Firebase refresh token returned by login, register, or refresh.
    AuthResponse:
      type: object
      properties:
        id_token:
          type: string
          description: Firebase ID token to send as a Bearer token to protected API endpoints.
        email:
          type: string
          format: email
        refresh_token:
          type: string
        expires_in:
          type: string
          description: Token lifetime in seconds, returned as a string by Firebase.
        local_id:
          type: string
          description: Firebase user ID.
        user_id:
          type: integer
          format: int64
          description: Internal Kloud Motors user ID.
    GetAuctionBidsResponse:
      type: object
      properties:
        bids:
          type: array
          items:
            "$ref": "#/components/schemas/Bid"
        total:
          type: integer
          format: int32
        page:
          type: integer
          format: int32
        page_size:
          type: integer
          format: int32
    GetAuctionResponse:
