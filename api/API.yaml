        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
  "/api/user/refresh":
    post:
      tags:
      - Users
      summary: Refresh a Firebase ID token
      description: |
        Exchanges a Firebase refresh token for a new ID token through the
        Kloud Motors gateway. The Firebase API key remains server-side.
      operationId: refreshUserToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RefreshTokenRequest"
            example:
              refresh_token: refresh-token-value
      responses:
