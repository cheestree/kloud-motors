        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID token
  parameters:
    AuctionIdPath:
      name: auction_id
      in: path
      required: true
      schema:
        type: string
    ChatIdPath:
      name: chat_id
      in: path
      required: true
      schema:
        type: string
    ListingIdPath:
      name: listing_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ListingIdPlainPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    SellerIdPath:
      name: seller_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    AuctionStatusQuery:
      name: status
      in: query
      required: false
      description: Optional auction status filter. Values are case-sensitive.
      schema:
        type: string
        enum:
        - ACTIVE
        - COMPLETED
        - CANCELLED
    BrandQuery:
      name: brand
      in: query
      required: false
      schema:
        type: string
    BrandQueryRequired:
      name: brand
      in: query
      required: true
      description: Vehicle brand. Missing or blank values return 400 on market insight endpoints.
      schema:
        type: string
        example: Toyota
    FuelTypeCamelQuery:
      name: fuelType
      in: query
      required: false
      description: Optional listing fuel type filter for search endpoints.
      schema:
        type: string
        example: Gasoline
    FuelTypeSnakeQuery:
      name: fuel_type
      in: query
      required: false
      description: Optional fuel type filter for market insight endpoints.
      schema:
        type: string
        example: Gasoline
    GroupByQuery:
      name: group_by
      in: query
      required: false
      description: Location dimension used to group market insight results.
      schema:
        type: string
        enum:
        - district
        - city
        - country
        default: district
    IdsQuery:
      name: ids
      in: query
      required: true
      description: Comma-separated listing IDs.
      schema:
        type: string
        pattern: '^[0-9]+(,[0-9]+)*$'
        example: 123,456,789
    IncludeSoldQuery:
      name: includeSold
      in: query
      required: false
      description: Include sold listings in listing search results when true.
      schema:
        type: boolean
        default: false
    LimitQuery:
      name: limit
      in: query
      required: false
      description: Defaults to 20 when omitted. Must be an integer greater than or equal to 1; invalid values return 400.
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 20
    LocationQuery:
      name: location
      in: query
      required: false
      description: Optional city, district, or country filter for location statistics.
      schema:
        type: string
        example: Lisbon
    LocationsQuery:
      name: locations
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
    MakeQuery:
      name: make
      in: query
      required: false
      description: Vehicle make filter for listing search.
      schema:
        type: string
        example: Toyota
    MaxMileageQuery:
      name: maxMileage
      in: query
      required: false
      schema:
        type: integer
        format: int32
    MaxPriceQuery:
      name: maxPrice
      in: query
      required: false
      schema:
        type: integer
        format: int64
    MetricsQuery:
      name: metrics
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          enum:
          - avg_price
          - median_price
          - count
    MinPriceQuery:
      name: minPrice
      in: query
      required: false
      schema:
        type: integer
        format: int64
    ModelQuery:
      name: model
      in: query
      required: false
      description: Vehicle model filter for listing search.
      schema:
        type: string
        example: Corolla
    ModelQueryRequired:
      name: model
      in: query
      required: true
      description: Vehicle model. Missing or blank values return 400 on market insight endpoints.
      schema:
        type: string
        example: Corolla
    OrderQuery:
      name: order
      in: query
      required: false
      description: Sort direction for market insight comparison results.
      schema:
        type: string
        enum:
        - asc
        - desc
        default: asc
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 1
    PageSizeCamelQuery:
      name: pageSize
      in: query
      required: false
      description: Page size for listing search endpoints. Responses use the snake_case `page_size` field.
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 20
    PageSizeSnakeQuery:
      name: page_size
      in: query
      required: false
      description: Page size for auction endpoints. Defaults to 20 at the gateway and caps the effective page size at 100.
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 20
    SkipQuery:
      name: skip
      in: query
      required: false
      description: Zero-based offset. Must be an integer greater than or equal to 0; invalid values return 400.
      schema:
        type: integer
        format: int32
        minimum: 0
        default: 0
    SortByQuery:
      name: sort_by
      in: query
      required: false
      description: Metric used to sort price comparison results.
      schema:
        type: string
        enum:
        - avg_price
        - count
        default: avg_price
    YearQuery:
      name: year
      in: query
      required: false
      description: Vehicle model year. Must be greater than or equal to 1886 when present.
      schema:
        type: integer
        format: int32
        minimum: 1886
    YearFromQuery:
      name: year_from
      in: query
      required: false
      description: Inclusive lower bound for vehicle model year. Must be greater than or equal to 0; when `year_to` is also present, `year_to` must be greater than or equal to `year_from`.
      schema:
        type: integer
        format: int32
        minimum: 0
        example: 2018
    YearToQuery:
      name: year_to
      in: query
      required: false
      description: Inclusive upper bound for vehicle model year. Must be greater than or equal to 0 and greater than or equal to `year_from` when both are present.
      schema:
        type: integer
        format: int32
        minimum: 0
        example: 2024
  responses:
    BadGatewayText:
      description: Upstream proxy or gateway communication failed.
      content:
        text/plain:
          schema:
            type: string
            example: failed to connect websocket upstream
    ServiceUnavailableText:
      description: Upstream service is unavailable, the circuit breaker is open, or the gateway is overloaded.
      content:
        text/plain:
          schema:
            type: string
            example: upstream service is unavailable
    GatewayTimeoutText:
      description: Upstream service call exceeded the gateway deadline.
      content:
        text/plain:
          schema:
            type: string
            example: context deadline exceeded
    BadRequestText:
      description: Invalid request body, missing required query/path field, unsupported enum value, malformed ID, or invalid pagination/filter value. Validation errors include endpoint-specific text and may include field-level details.
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
          example:
            error: bad_request
            message: "Invalid aggregate filters: brand and model are required; metrics must be avg_price, median_price, or count; group_by must be district, city, or country; year_from and year_to must be at least 0 with year_to >= year_from; limit must be at least 1; skip must be at least 0"
            fields:
            - field: year_to
              message: must be greater than or equal to year_from
        text/plain:
          schema:
            type: string
            example: Invalid request body
    ConflictText:
      description: Request conflicts with current resource state, such as creating a duplicate resource or performing an action that is no longer valid.
      content:
        text/plain:
          schema:
            type: string
            example: resource already exists
    ForbiddenText:
      description: Authenticated user is not allowed to access or mutate the requested resource.
      content:
        text/plain:
          schema:
            type: string
            example: permission denied
    InternalServerErrorText:
      description: Unexpected gateway or service error.
      content:
        text/plain:
          schema:
            type: string
            example: internal server error
    MethodNotAllowedText:
      description: Method not allowed.
      content:
        text/plain:
          schema:
            type: string
            example: Method not allowed
    NotFoundText:
      description: Requested listing, auction, bid collection, seller, chat, user, or matching market data was not found.
      content:
        text/plain:
          schema:
            type: string
            example: Not found
    UnauthorizedText:
      description: Missing, malformed, expired, or invalid Firebase bearer token.
      content:
        text/plain:
          schema:
            type: string
            example: Unauthorized
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: bad_request
        message:
          type: string
        fields:
          type: array
          items:
            "$ref": "#/components/schemas/FieldError"
    FieldError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
    Aggregates:
      type: object
      properties:
        location:
          type: string
        avg_price:
          type: integer
          format: int32
        median_price:
          type: integer
          format: int32
        count:
          type: integer
          format: int32
    AggregatesResponse:
      type: object
      properties:
        aggregates:
          type: array
          items:
            "$ref": "#/components/schemas/Aggregates"
        pagination:
          "$ref": "#/components/schemas/Pagination"
    Auction:
      type: object
      properties:
        auction_id:
          type: string
        listing_id:
          type: integer
          format: int64
        seller_id:
          type: integer
          format: int64
        starting_price:
          type: number
          format: double
        current_price:
          type: number
          format: double
          nullable: true
        status:
          type: string
          enum:
          - ACTIVE
          - COMPLETED
          - CANCELLED
        end_time:
          type: string
          format: date-time
          description: Auction closing time in RFC 3339 format.
        winner_user_id:
          type: string
          nullable: true
        created_at:
          type: string
        reserve_met:
          type: boolean
        total_bids:
          type: integer
          format: int32
    AveragePriceResponse:
      type: object
      properties:
        brand:
          type: string
        model:
          type: string
        average_price:
          type: number
          format: double
        min_price:
          type: number
          format: double
        max_price:
          type: number
          format: double
        listing_count:
          type: integer
          format: int32
    Bid:
      type: object
      properties:
        bid_id:
          type: string
        auction_id:
          type: string
        bidder_id:
          type: string
        bid_amount:
          type: number
          format: double
        timestamp:
          type: string
    ByLocationResponse:
      type: object
      properties:
        stats:
          "$ref": "#/components/schemas/Stats"
    ChatMessage:
      type: object
      properties:
        sender_id:
          type: integer
          format: int64
        content:
          type: string
        timestamp:
          type: integer
          format: int64
    ChatsSummary:
      type: object
      properties:
        chat_id:
          type: string
        listing_id:
          type: integer
          format: int64
        brand:
          type: string
        model:
          type: string
    Comparisons:
      type: object
      properties:
        location:
          type: string
        average_price:
          type: integer
          format: int32
        listing_count:
          type: integer
          format: int32
    CompareListingsResponse:
      type: object
      properties:
        listings:
          type: array
          items:
            "$ref": "#/components/schemas/ListingDetailsResponse"
    CreateAuctionRequest:
      type: object
      required:
      - listing_id
      - starting_price
      - end_time
      properties:
        listing_id:
          type: integer
          format: int64
        seller_id:
          type: integer
          format: int64
          readOnly: true
          description: Overwritten from the authenticated user by the gateway.
        starting_price:
          type: number
          format: double
        end_time:
          type: string
          format: date-time
          description: Auction closing time in RFC 3339 format, for example `2026-06-10T18:00:00Z`.
        reserve_price:
          type: number
          format: double
          nullable: true
    CreateAuctionResponse:
      type: object
      properties:
        auction:
          "$ref": "#/components/schemas/Auction"
    CreateListingRequest:
      type: object
      required:
      - vin
      - make
      - model
      - year
      properties:
        vin:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
          format: int32
        price:
          type: number
          format: double
        mileage:
          type: integer
          format: int32
        city:
          type: string
        district:
          type: string
