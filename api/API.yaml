openapi: 3.0.3
info:
  title: Kloud Motors - Online Car Dealer
  version: 1.0.0
  description: |
    Protected endpoints declare `bearerAuth` and require `Authorization: Bearer <id_token>`, where `id_token` is returned by `/api/user/login`, `/api/user/register`, or `/api/user/refresh`.

    Query parameters use the names documented per endpoint. Listing search endpoints accept `pageSize` and return `page_size` in JSON responses; auction endpoints accept and return `page_size`.

    Successful responses with a JSON body are documented under `application/json`. Gateway validation errors commonly return a JSON error object with endpoint-specific text and field-level details; some legacy/proxy errors still return `text/plain`.

    - **Market Price Analysis**: Calculate the average price of cars based on brand, model, year, and location.
    - **Filtered Search**: Allow users to search for cars based on specific criteria(make, model, year, price range, mileage, fuel type, location).
    - **Geographical Market Insights**: Analyze car availability and price variations across different regions.
    - **Seller Management & Profiling**: Distinguish between professional dealers and private sellers.
    - **Buyer–Seller Communication**: Enable real-time messaging between the buyer and the seller of a specific listing.
    - **Visitor & User Registration**: Track and register platform visitors, registered users can save favourite listings.
    - **Auction Module**: Allow sellers to list cars under an auction format.
    - **Listing details and comparison**: Provide detailed information on each listing and allow users to compare multiple listings side by side based on price, mileage, year and location.
tags:
- name: Chat
  description: Buyer-Seller communication endpoints
- name: Geographical Market Insights
  description: Geographical market insights and listing aggregation
- name: Market Price Analysis
  description: Endpoints for average car prices
- name: Auction
  description: Endpoints for car auction listings
- name: Users
  description: User profiles and favorite listings
- name: Sellers
  description: Seller management and profiling
- name: Listings
  description: Filtered car search and listing comparison
paths:
  "/api/user/login":
    post:
      tags:
      - Users
      summary: Authenticate a user with email and password
      description: |
        Exchanges an email and password for a Firebase ID token through the
        Kloud Motors gateway. The Firebase API key remains server-side.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/AuthRequest"
            example:
              email: seller7514@mock.local
              password: password123
      responses:
        '200':
          description: User authentication token response.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AuthResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '401':
          "$ref": "#/components/responses/UnauthorizedText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/user/register":
    post:
      tags:
      - Users
      summary: Register a user with email and password
      description: |
        Creates a Firebase Auth user and returns tokens plus the internal
        Kloud Motors user id.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/AuthRequest"
            example:
              email: new-seller@example.com
              password: password123
      responses:
        '200':
          description: User registration token response.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AuthResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '401':
          "$ref": "#/components/responses/UnauthorizedText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '409':
          "$ref": "#/components/responses/ConflictText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/user/refresh":
    post:
      tags:
      - Users
      summary: Refresh a Firebase ID token
      description: |
        Exchanges a Firebase refresh token for a new ID token through the
        Kloud Motors gateway. The Firebase API key remains server-side.
      operationId: refreshUserToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RefreshTokenRequest"
            example:
              refresh_token: refresh-token-value
      responses:
        '200':
          description: Refreshed authentication token response.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AuthResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '401':
          "$ref": "#/components/responses/UnauthorizedText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/chat":
    get:
      tags:
      - Chat
      summary: Get user chats
      description: |
        Requires `Authorization: Bearer <id_token>` from login, registration, or refresh.
        Returns the chats visible to the authenticated user.
      operationId: getChats
      security:
      - bearerAuth: []
      responses:
        '200':
          description: User chats.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetChatsResponse"
        '401':
          "$ref": "#/components/responses/UnauthorizedText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/chat/open":
    post:
      tags:
      - Chat
      summary: Open or create a buyer-seller chat session
      description: The authenticated user is derived from the bearer token; clients only provide the seller and listing IDs. Returns 404 when the referenced seller or listing cannot be resolved.
      operationId: openChat
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/OpenChatRequest"
            example:
              seller_id: 7514
              listing_id: 128390
      responses:
        '200':
          description: Chat session opened.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/OpenChatResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '401':
          "$ref": "#/components/responses/UnauthorizedText"
        '403':
          "$ref": "#/components/responses/ForbiddenText"
        '404':
          "$ref": "#/components/responses/NotFoundText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/chat/{chat_id}":
    get:
      tags:
      - Chat
      summary: Get chat history
      description: Requires a bearer token. Returns 403 when the authenticated user cannot access the chat and 404 when the chat id does not exist.
      operationId: getChatHistory
      security:
      - bearerAuth: []
      parameters:
      - "$ref": "#/components/parameters/ChatIdPath"
      - "$ref": "#/components/parameters/LimitQuery"
      - "$ref": "#/components/parameters/SkipQuery"
      responses:
        '200':
          description: Chat history.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetChatHistoryResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '401':
          "$ref": "#/components/responses/UnauthorizedText"
        '403':
          "$ref": "#/components/responses/ForbiddenText"
        '404':
          "$ref": "#/components/responses/NotFoundText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/chat/ws/{chat_id}":
    get:
      tags:
      - Chat
      summary: Chat WebSocket proxy
      description: Upgrades an authenticated user into the chat WebSocket. The chat id must identify an existing chat visible to that user.
      operationId: connectChatWebSocket
      security:
      - bearerAuth: []
      parameters:
      - "$ref": "#/components/parameters/ChatIdPath"
      responses:
        '101':
          description: Switching Protocols.
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '401':
          "$ref": "#/components/responses/UnauthorizedText"
        '404':
          "$ref": "#/components/responses/NotFoundText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/market/insights/aggregates":
    get:
      tags:
      - Geographical Market Insights
      summary: Get aggregated market insights
      description: Requires `brand` and `model`. `metrics`, `group_by`, `year_from`, `year_to`, `limit`, and `skip` are validated at the gateway; `year_from` and `year_to` must be at least 0, and `year_to` must be greater than or equal to `year_from`. Invalid filters, pagination values, enum values, or inverted year ranges return 400. Upstream geo-service overloads are surfaced as 503 and timeouts as 504.
      operationId: getMarketInsightsAggregates
      parameters:
      - "$ref": "#/components/parameters/BrandQueryRequired"
      - "$ref": "#/components/parameters/ModelQueryRequired"
      - "$ref": "#/components/parameters/MetricsQuery"
      - "$ref": "#/components/parameters/GroupByQuery"
      - "$ref": "#/components/parameters/LocationsQuery"
      - "$ref": "#/components/parameters/YearFromQuery"
      - "$ref": "#/components/parameters/YearToQuery"
      - "$ref": "#/components/parameters/FuelTypeSnakeQuery"
      - "$ref": "#/components/parameters/LimitQuery"
      - "$ref": "#/components/parameters/SkipQuery"
      responses:
        '200':
          description: Aggregated market insights.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AggregatesResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/market/price-comparison":
    get:
      tags:
      - Geographical Market Insights
      summary: Compare prices across locations
      description: Requires `brand` and `model`. `group_by`, `sort_by`, `order`, `limit`, and `skip` are validated at the gateway; invalid enum or pagination values return 400.
      operationId: getPriceComparison
      parameters:
      - "$ref": "#/components/parameters/BrandQueryRequired"
      - "$ref": "#/components/parameters/ModelQueryRequired"
      - "$ref": "#/components/parameters/GroupByQuery"
      - "$ref": "#/components/parameters/SortByQuery"
      - "$ref": "#/components/parameters/OrderQuery"
      - "$ref": "#/components/parameters/LimitQuery"
      - "$ref": "#/components/parameters/SkipQuery"
      responses:
        '200':
          description: Price comparison.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PriceComparisonResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/listings/stats/by-location":
    get:
      tags:
      - Geographical Market Insights
      summary: Get listing price statistics by location
      description: Requires `brand` and `model`; optional filters narrow the statistics by location, year range, or fuel type. `year_from` and `year_to` must be at least 0, and `year_to` must be greater than or equal to `year_from`.
      operationId: getListingStatsByLocation
      parameters:
      - "$ref": "#/components/parameters/BrandQueryRequired"
      - "$ref": "#/components/parameters/ModelQueryRequired"
      - "$ref": "#/components/parameters/LocationQuery"
      - "$ref": "#/components/parameters/YearFromQuery"
      - "$ref": "#/components/parameters/YearToQuery"
      - "$ref": "#/components/parameters/FuelTypeSnakeQuery"
      responses:
        '200':
          description: Listing statistics.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ByLocationResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/market/average-price":
    get:
      tags:
      - Market Price Analysis
      summary: Get average market price
      description: Calculates average, minimum, and maximum market price for a brand/model and optional year range. `year_from` and `year_to` must be at least 0, and `year_to` must be greater than or equal to `year_from`. Returns 404 when no matching market data is found.
      operationId: getAverageMarketPrice
      parameters:
      - "$ref": "#/components/parameters/BrandQueryRequired"
      - "$ref": "#/components/parameters/ModelQueryRequired"
      - "$ref": "#/components/parameters/YearFromQuery"
      - "$ref": "#/components/parameters/YearToQuery"
      responses:
        '200':
          description: Average market price.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AveragePriceResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '404':
          "$ref": "#/components/responses/NotFoundText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/auctions":
    get:
      tags:
      - Auction
      summary: List auctions
      operationId: listAuctions
      parameters:
      - "$ref": "#/components/parameters/AuctionStatusQuery"
      - "$ref": "#/components/parameters/PageQuery"
      - "$ref": "#/components/parameters/PageSizeSnakeQuery"
      responses:
        '200':
          description: Auctions.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListAuctionsResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
    post:
      tags:
      - Auction
      summary: Create an auction
      operationId: createAuction
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateAuctionRequest"
            example:
              listing_id: 128390
              starting_price: 8500
              end_time: "2026-06-10T18:00:00Z"
              reserve_price: 10000
      responses:
        '201':
          description: Auction created.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CreateAuctionResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '401':
          "$ref": "#/components/responses/UnauthorizedText"
        '403':
          "$ref": "#/components/responses/ForbiddenText"
        '404':
          "$ref": "#/components/responses/NotFoundText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '409':
          "$ref": "#/components/responses/ConflictText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/auctions/{auction_id}":
    get:
      tags:
      - Auction
      summary: Get auction details
      operationId: getAuction
      parameters:
      - "$ref": "#/components/parameters/AuctionIdPath"
      responses:
        '200':
          description: Auction details.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetAuctionResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '404':
          "$ref": "#/components/responses/NotFoundText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
    delete:
      tags:
      - Auction
      summary: Delete an auction
      operationId: deleteAuction
      security:
      - bearerAuth: []
      parameters:
      - "$ref": "#/components/parameters/AuctionIdPath"
      responses:
        '204':
          description: Auction deleted.
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '401':
          "$ref": "#/components/responses/UnauthorizedText"
        '403':
          "$ref": "#/components/responses/ForbiddenText"
        '404':
          "$ref": "#/components/responses/NotFoundText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/auctions/{auction_id}/bid":
    post:
      tags:
      - Auction
      summary: Place a bid
      operationId: placeBid
      security:
      - bearerAuth: []
      parameters:
      - "$ref": "#/components/parameters/AuctionIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PlaceBidRequest"
            example:
              bid_amount: 9200
      responses:
        '200':
          description: Bid placed.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PlaceBidResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '401':
          "$ref": "#/components/responses/UnauthorizedText"
        '404':
          "$ref": "#/components/responses/NotFoundText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/auctions/{auction_id}/bids":
    get:
      tags:
      - Auction
      summary: Get auction bids
      operationId: getAuctionBids
      parameters:
      - "$ref": "#/components/parameters/AuctionIdPath"
      - "$ref": "#/components/parameters/PageQuery"
      - "$ref": "#/components/parameters/PageSizeSnakeQuery"
      responses:
        '200':
          description: Auction bids.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetAuctionBidsResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '404':
          "$ref": "#/components/responses/NotFoundText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/auctions/ws/{auction_id}":
    get:
      tags:
      - Auction
      summary: Auction WebSocket proxy
      operationId: connectAuctionWebSocket
      security:
      - bearerAuth: []
      parameters:
      - "$ref": "#/components/parameters/AuctionIdPath"
      responses:
        '101':
          description: Switching Protocols.
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '401':
          "$ref": "#/components/responses/UnauthorizedText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/users/me/favorites":
    get:
      tags:
      - Users
      summary: Get the authenticated user's favorite listing IDs
      operationId: getFavoriteListings
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Favorite listing IDs.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/FavoritesResponse"
        '401':
          "$ref": "#/components/responses/UnauthorizedText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
  "/api/users/me/favorites/{listing_id}":
    post:
      tags:
      - Users
      summary: Add a listing to favorites
      operationId: addFavoriteListing
      security:
      - bearerAuth: []
      parameters:
      - "$ref": "#/components/parameters/ListingIdPath"
      responses:
        '200':
          description: Mutation result.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/FavoriteMutationResponse"
        '400':
          "$ref": "#/components/responses/BadRequestText"
        '401':
          "$ref": "#/components/responses/UnauthorizedText"
        '405':
          "$ref": "#/components/responses/MethodNotAllowedText"
        '409':
          "$ref": "#/components/responses/ConflictText"
        '500':
          "$ref": "#/components/responses/InternalServerErrorText"
        '502':
          "$ref": "#/components/responses/BadGatewayText"
        '503':
          "$ref": "#/components/responses/ServiceUnavailableText"
        '504':
          "$ref": "#/components/responses/GatewayTimeoutText"
    delete:
      tags:
      - Users
      summary: Remove a listing from favorites
      operationId: removeFavoriteListing
      security:
      - bearerAuth: []
      parameters:
      - "$ref": "#/components/parameters/ListingIdPath"
      responses:
        '200':
          description: Mutation result.
          content:
            application/json:
              schema:
