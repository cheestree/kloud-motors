openapi: 3.0.3
info:
  title: Car Listings API
  description: API for filtered car search and listing comparison.
  version: 1.0.0

servers:
  - url: /cars

paths:
  /:
    get:
      summary: Filtered car search
      description: Search for car listings using filters such as mileage, price range, make, model, year, and fuel type.
      operationId: searchCars
      parameters:
        - name: make
          in: query
          description: Car manufacturer (e.g. Toyota, Ford)
          schema:
            type: string
        - name: model
          in: query
          description: Car model (e.g. Corolla, Mustang)
          schema:
            type: string
        - name: year
          in: query
          description: Manufacturing year
          schema:
            type: integer
        - name: minPrice
          in: query
          description: Minimum price in USD
          schema:
            type: number
            format: float
        - name: maxPrice
          in: query
          description: Maximum price in USD
          schema:
            type: number
            format: float
        - name: maxMileage
          in: query
          description: Maximum mileage in miles
          schema:
            type: integer
        - name: fuelType
          in: query
          description: Fuel type (e.g. gasoline, diesel, electric)
          schema:
            type: string
            enum: [gasoline, diesel, hybrid, electric]
        - name: location
          in: query
          description: City or region to filter listings by
          schema:
            type: string
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          description: Number of results per page
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: A paginated list of car listings matching the filters
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total number of matching listings
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  listings:
                    type: array
                    items:
                      $ref: '#/components/schemas/CarSummary'
        '400':
          description: Invalid query parameters

  /{id}:
    get:
      summary: Get listing details
      description: Retrieve full details for a specific car listing.
      operationId: getCarById
      parameters:
        - name: id
          in: path
          required: true
          description: Unique listing identifier
          schema:
            type: string
      responses:
        '200':
          description: Full details of the car listing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarListing'
        '404':
          description: Listing not found

  /compare:
    get:
      summary: Compare multiple listings
      description: Retrieve and compare multiple car listings side by side based on price, mileage, year, and location.
      operationId: compareListings
      parameters:
        - name: ids
          in: query
          required: true
          description: Comma-separated list of listing IDs to compare
          schema:
            type: string
            example: "abc123,def456,ghi789"
      responses:
        '200':
          description: Comparison data for the requested listings
          content:
            application/json:
              schema:
                type: object
                properties:
                  listings:
                    type: array
                    items:
                      $ref: '#/components/schemas/CarListing'
        '400':
          description: Missing or invalid IDs parameter
        '404':
          description: One or more listings not found

components:
  schemas:
    CarSummary:
      type: object
      properties:
        id:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        price:
          type: number
          format: float
        mileage:
          type: integer
        location:
          type: string
        fuelType:
          type: string

    CarListing:
      allOf:
        - $ref: '#/components/schemas/CarSummary'
        - type: object
          properties:
            trim:
              type: string
            transmission:
              type: string
              enum: [automatic, manual]
            color:
              type: string
            sellerType:
              type: string
              enum: [dealer, private]
            description:
              type: string
            listedAt:
              type: string
              format: date-time
