openapi: 3.0.3
info:
  title: Car Marketplace API - Phase 2
  version: 1.0.0
  description: |
    OpenAPI specification generated from Phase 2 use cases:
    - Use Case 5: Buyer-Seller Communication
    - Use Case 3: Geographical Market Insights
tags:
  - name: Chat
    description: Buyer-Seller communication endpoints
  - name: Market Insights
    description: Geographical market insights and listing aggregation
  - name: Users
    description: User management operations
  - name: Listings
    description: Car listings operations
  - name: Auctions
    description: Auction operations

paths:
  /api/chat/open:
    post:
      tags: [Chat]
      summary: Open or create a buyer-seller chat session
      description: |
        Enables messaging between a buyer and a seller for a specific listing.
      operationId: openChat
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenChatRequest'
      responses:
        '200':
          description: Chat session opened successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenChatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/chat/{chat_id}:
    get:
      tags: [Chat]
      summary: Get chat history
      description: Retrieves message history for a specific chat session.
      operationId: getChatHistory
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatIdPath'
      responses:
        '200':
          description: Chat history retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatHistoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /ws/chat/{chat_id}:
    get:
      tags: [Chat]
      summary: WebSocket chat endpoint
      description: |
        WebSocket endpoint for real-time messaging in an active chat session.
      operationId: connectChatWebSocket
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatIdPath'
      responses:
        '101':
          description: Switching Protocols (WebSocket upgrade)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/market/insights/geo:
    get:
      tags: [Market Insights]
      summary: Get geographical market insights
      description: |
        Returns price insights for a given car model across selected locations or generally if no locations are specified.
      operationId: getGeoMarketInsights
      parameters:
        - $ref: '#/components/parameters/BrandQuery'
        - $ref: '#/components/parameters/ModelQuery'
        - $ref: '#/components/parameters/LocationsQuery'
        - $ref: '#/components/parameters/YearFromQuery'
        - $ref: '#/components/parameters/YearToQuery'
        - $ref: '#/components/parameters/FuelTypeQuery'
      responses:
        '200':
          description: Geographical insights retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeoInsightsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/market/price-comparison:
    get:
      tags: [Market Insights]
      summary: Compare prices across locations
      description: Provides price comparison grouped by district, city or country for a specific car model, with optional sorting and limiting.
      operationId: getPriceComparison
      parameters:
        - $ref: '#/components/parameters/BrandQuery'
        - $ref: '#/components/parameters/ModelQuery'
        - $ref: '#/components/parameters/GroupByDistrictCityCountryQuery'
        - $ref: '#/components/parameters/SortByQuery'
        - $ref: '#/components/parameters/OrderQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Price comparison retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceComparisonResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/listings/aggregate:
    get:
      tags: [Market Insights]
      summary: Aggregate listing metrics by location
      description: Aggregates requested listing metrics grouped by location fields.
      operationId: getListingsAggregate
      parameters:
        - $ref: '#/components/parameters/BrandQuery'
        - $ref: '#/components/parameters/ModelQuery'
        - $ref: '#/components/parameters/MetricsQuery'
        - $ref: '#/components/parameters/GroupByLocationQuery'
        - $ref: '#/components/parameters/YearFromQuery'
        - $ref: '#/components/parameters/YearToQuery'
      responses:
        '200':
          description: Aggregates retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingsAggregateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/listings/stats/by-location:
    get:
      tags: [Market Insights]
      summary: Get listing price statistics by location
      description: |
        Returns minimum, maximum, average and median price for a model in a
        selected location.
      operationId: getListingStatsByLocation
      parameters:
        - $ref: '#/components/parameters/BrandQuery'
        - $ref: '#/components/parameters/ModelQuery'
        - $ref: '#/components/parameters/LocationQuery'
        - $ref: '#/components/parameters/YearFromQuery'
        - $ref: '#/components/parameters/YearToQuery'
        - $ref: '#/components/parameters/FuelTypeQuery'
      responses:
        '200':
          description: Statistics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingStatsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users:
    post:
      tags: [Users]
      summary: Register a new visitor/user
      description: Registers a user profile for a visitor.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/{user_id}:
    get:
      tags: [Users]
      summary: Get a user profile
      description: Retrieves a profile (dealer or private seller/buyer).
      operationId: getUserProfile
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Users]
      summary: Update a user profile
      description: Updates user details.
      operationId: updateUserProfile
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Users]
      summary: Delete a user profile
      description: Soft or hard deletes a user.
      operationId: deleteUser
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '204':
          description: Deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/listings:
    get:
      tags: [Listings]
      summary: Filtered search for car listings
      description: Search listings using criteria like make, model, year, price range, mileage, fuel type, location.
      operationId: searchListings
      parameters:
        - $ref: '#/components/parameters/BrandQueryOptional'
        - $ref: '#/components/parameters/ModelQueryOptional'
        - $ref: '#/components/parameters/YearFromQuery'
        - $ref: '#/components/parameters/YearToQuery'
        - $ref: '#/components/parameters/PriceMinQuery'
        - $ref: '#/components/parameters/PriceMaxQuery'
        - $ref: '#/components/parameters/MileageMaxQuery'
        - $ref: '#/components/parameters/FuelTypeQuery'
        - $ref: '#/components/parameters/LocationQuery'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingSearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Listings]
      summary: Create a listing
      description: Create a new car listing.
      operationId: createListing
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingCreateRequest'
      responses:
        '201':
          description: Listing created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/listings/compare:
    get:
      tags: [Listings]
      summary: Compare listed cars
      description: Provide detailed constraints and side-by-side comparison.
      operationId: compareListings
      parameters:
        - $ref: '#/components/parameters/ListingIdsQuery'
      responses:
        '200':
          description: Comparison data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingComparisonResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/listings/{listing_id}:
    get:
      tags: [Listings]
      summary: Get listing details
      description: Fetch a singular listing details.
      operationId: getListing
      parameters:
        - $ref: '#/components/parameters/ListingIdPath'
      responses:
        '200':
          description: Listing details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Listings]
      summary: Update a listing
      description: Update details.
      operationId: updateListing
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ListingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingUpdateRequest'
      responses:
        '200':
          description: Listing updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Listings]
      summary: Remove a listing
      description: Delete a specific listing.
      operationId: deleteListing
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ListingIdPath'
      responses:
        '204':
          description: Success
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auctions:
    get:
      tags: [Auctions]
      summary: Fetch active auctions
      description: Get a list of active auctions.
      operationId: searchAuctions
      responses:
        '200':
          description: Auctions retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuctionSearchResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Auctions]
      summary: List a car for auction
      description: Setup a car listing in an auction format.
      operationId: createAuction
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuctionCreateRequest'
      responses:
        '201':
          description: Auction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuctionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auctions/{auction_id}:
    get:
      tags: [Auctions]
      summary: Get auction details
      description: Details and current bids.
      operationId: getAuction
      parameters:
        - $ref: '#/components/parameters/AuctionIdPath'
      responses:
        '200':
          description: Auction entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuctionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Auctions]
      summary: Cancel an auction
      description: Remove auction early.
      operationId: deleteAuction
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/AuctionIdPath'
      responses:
        '204':
          description: Success
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auctions/{auction_id}/bids:
    post:
      tags: [Auctions]
      summary: Place a bid
      description: Post a bid amount on an active auction.
      operationId: placeBid
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/AuctionIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BidRequest'
      responses:
        '201':
          description: Bid accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Bid validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/market/average-price:
    get:
      tags: [Market Insights]
      summary: Get average market price
      description: Returns the average price for cars matching specific criteria to serve the Market Price Analysis use case.
      operationId: getAverageMarketPrice
      parameters:
        - $ref: '#/components/parameters/BrandQuery'
        - $ref: '#/components/parameters/ModelQuery'
        - $ref: '#/components/parameters/LocationQuery'
      responses:
        '200':
          description: Average price retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AveragePriceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token

  parameters:
    ChatIdPath:
      name: chat_id
      in: path
      required: true
      schema:
        type: string
      description: Chat session ID

    BrandQuery:
      name: brand
      in: query
      required: true
      schema:
        type: string
      description: Car brand (e.g., Toyota)
 
    ModelQuery:
      name: model
      in: query
      required: true
      schema:
        type: string
      description: Car model (e.g., Corolla)

    LocationsQuery:
      name: locations
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
      description: Optional list of districts/cities for comparison

    YearFromQuery:
      name: year_from
      in: query
      required: false
      schema:
        type: integer
        minimum: 1886
      description: Minimum model year filter

    YearToQuery:
      name: year_to
      in: query
      required: false
      schema:
        type: integer
        minimum: 1886
      description: Maximum model year filter

    FuelTypeQuery:
      name: fuel_type
      in: query
      required: false
      schema:
        type: string
      description: Fuel type filter (e.g., Gasoline)

    GroupByDistrictCityCountryQuery:
      name: group_by
      in: query
      required: true
      schema:
        type: string
        enum: [district, city, country]
      description: Grouping field for comparison

    SortByQuery:
      name: sort_by
      in: query
      required: false
      schema:
        type: string
        enum: [avg_price, count]
      description: Sort field

    OrderQuery:
      name: order
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
      description: Sort order

    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: Maximum number of groups to return

    MetricsQuery:
      name: metrics
      in: query
      required: true
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          enum: [avg_price, median_price, count]
      description: Metrics to aggregate

    GroupByLocationQuery:
      name: group_by
      in: query
      required: true
      schema:
        type: string
        enum: [location, district, city, country]
      description: Grouping field for aggregation

    LocationQuery:
      name: location
      in: query
      required: false
      schema:
        type: string
      description: District or city filter

    BrandQueryOptional:
      name: brand
      in: query
      required: false
      schema:
        type: string
      description: Car brand filter
 
    ModelQueryOptional:
      name: model
      in: query
      required: false
      schema:
        type: string
      description: Car model filter

    PriceMinQuery:
      name: price_min
      in: query
      required: false
      schema:
        type: number
      description: Minimum price filter

    PriceMaxQuery:
      name: price_max
      in: query
      required: false
      schema:
        type: number
      description: Maximum price filter

    MileageMaxQuery:
      name: mileage_max
      in: query
      required: false
      schema:
        type: number
      description: Maximum mileage filter

    UserIdPath:
      name: user_id
      in: path
      required: true
      schema:
        type: string
      description: User ID

    ListingIdPath:
      name: listing_id
      in: path
      required: true
      schema:
        type: string
      description: Listing ID

    ListingIdsQuery:
      name: ids
      in: query
      required: true
      schema:
        type: array
        items:
          type: string
      style: form
      explode: false
      description: Comma-separated listing IDs

    AuctionIdPath:
      name: auction_id
      in: path
      required: true
      schema:
        type: string
      description: Auction ID

  responses:
    BadRequest:
      description: Invalid input/query parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: User not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: User does not have permission to access this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Server error while processing the request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    UserRegistrationRequest:
      type: object
      required: [username, email, password, role]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        role:
          type: string
          enum: [private, dealer]

    UserUpdateRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
          format: email

    UserProfileResponse:
      type: object
      required: [id, username, email, role, created_at]
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [private, dealer]
        created_at:
          type: string
          format: date-time

    ListingCreateRequest:
      type: object
      required: [brand, model, year, price, mileage, fuel_type, location]
      properties:
        brand:
          type: string
        model:
          type: string
        year:
          type: integer
        price:
          type: number
        mileage:
          type: number
        fuel_type:
          type: string
        location:
          type: string
        condition:
          type: string
          enum: [new, used]

    ListingUpdateRequest:
      type: object
      properties:
        price:
          type: number
        mileage:
          type: number
        condition:
          type: string
          enum: [new, used]
        status:
          type: string
          enum: [active, sold, inactive]

    ListingResponse:
      type: object
      required: [id, seller_id, brand, model, year, price, mileage, fuel_type, location, created_at]
      properties:
        id:
          type: string
        seller_id:
          type: string
        brand:
          type: string
        model:
          type: string
        year:
          type: integer
        price:
          type: number
        mileage:
          type: number
        fuel_type:
          type: string
        location:
          type: string
        condition:
          type: string
          enum: [new, used]
        status:
          type: string
          enum: [active, sold, inactive]
        created_at:
          type: string
          format: date-time

    ListingSearchResponse:
      type: object
