services:
  gateway:
    container_name: gateway-service
    build:
      context: ./code/services
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - LISTING_GRPC_ADDR=${LISTING_GRPC_ADDR}
      - SEARCH_GRPC_ADDR=${SEARCH_GRPC_ADDR}
      - AUTH_GRPC_ADDR=${AUTH_GRPC_ADDR}
      - USER_GRPC_ADDR=${USER_GRPC_ADDR}
      - SELLER_GRPC_ADDR=${SELLER_GRPC_ADDR}
      - CHAT_GRPC_ADDR=${CHAT_GRPC_ADDR}
      - GEO_GRPC_ADDR=${GEO_GRPC_ADDR}
      - AUCTION_GRPC_ADDR=${AUCTION_GRPC_ADDR}
      - MARKETPRICE_GRPC_ADDR=${MARKETPRICE_GRPC_ADDR}
      - JWT_PUBLIC_KEY_B64=${JWT_PUBLIC_KEY_B64}
    depends_on:
      - listing
      - search
      - marketprice
  search:
    container_name: search-service
    build:
      context: ./code/services
      dockerfile: search/Dockerfile
    restart: on-failure
    ports:
      - "${SEARCH_HOST_PORT:-50056}:50056"
    environment:
      DATABASE_URL: ${LISTING_DATABASE_URL}
    depends_on:
      listing-db:
        condition: service_healthy

  listing:
    container_name: listing-service
    build:
      context: ./code/services
      dockerfile: listing/Dockerfile
    restart: on-failure
    ports:
      - "50054:50054"
    environment:
      DATABASE_URL: ${LISTING_DATABASE_URL}
    depends_on:
      listing-db:
        condition: service_healthy

  marketprice:
    container_name: marketprice-service
    build:
      context: ./code/services
      dockerfile: marketprice/Dockerfile
    restart: on-failure
    ports:
      - "50055:50055"
    environment:
      DATABASE_URL: ${LISTING_DATABASE_URL}
    depends_on:
      listing-db:
        condition: service_healthy

  auction:
    container_name: auction-service
    build:
      context: ./code/services
      dockerfile: auction/Dockerfile
    restart: on-failure
    ports:
      - "${AUCTION_GRPC_PORT}:${AUCTION_GRPC_PORT}"
      - "${AUCTION_WS_PORT}:${AUCTION_WS_PORT}"
    environment:
      AUCTION_DATABASE_URL: ${AUCTION_DATABASE_URL}
      LISTING_GRPC_ADDR: ${LISTING_GRPC_ADDR}
      AUCTION_GRPC_PORT: ${AUCTION_GRPC_PORT}
      AUCTION_WS_PORT: ${AUCTION_WS_PORT}
    depends_on:
      auction-db:
        condition: service_healthy

  listing-db:
    container_name: listing-db
    image: postgres:16
    environment:
      POSTGRES_USER: ${LISTING_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LISTING_POSTGRES_PASSWORD}
      POSTGRES_DB: ${LISTING_POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - listing_postgres_data:/var/lib/postgresql/data

  user:
    container_name: user-service
    build:
      context: ./code/services
      dockerfile: user/Dockerfile
    restart: on-failure
    ports:
      - "50058:50058"
    environment:
      DATABASE_URL: ${USER_DATABASE_URL}
    depends_on:
      user-db:
        condition: service_healthy

  auth:
    container_name: auth-service
    build:
      context: ./code/services
      dockerfile: auth/Dockerfile
    ports:
      - "50053:50053"
    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL}
      JWT_PRIVATE_KEY_B64: ${JWT_PRIVATE_KEY_B64}
      USER_GRPC_ADDR: ${USER_GRPC_ADDR}
    depends_on:
      auth-db:
        condition: service_healthy

  seller:
    container_name: seller-service
    build:
      context: ./code/services
      dockerfile: seller/Dockerfile
    restart: on-failure
    ports:
      - "50057:50057"
    environment:
      DATABASE_URL: ${SELLER_DATABASE_URL}
      LISTING_DATABASE_URL: ${LISTING_DATABASE_URL}
    depends_on:
      seller-db:
        condition: service_healthy
      listing-db:
        condition: service_healthy

  user-db:
    container_name: user-db
    image: postgres:16
    environment:
      POSTGRES_USER: ${USER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${USER_POSTGRES_PASSWORD}
      POSTGRES_DB: ${USER_POSTGRES_DB}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - user_postgres_data:/var/lib/postgresql/data

  auth-db:
    container_name: auth-db
    image: postgres:16
    environment:
      POSTGRES_USER: ${AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data

  seller-db:
    container_name: seller-db
    image: postgres:16
    environment:
      POSTGRES_USER: ${SELLER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${SELLER_POSTGRES_PASSWORD}
      POSTGRES_DB: ${SELLER_POSTGRES_DB}
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - seller_postgres_data:/var/lib/postgresql/data

  chat-db:
    container_name: chat-db
    image: postgres:16
    environment:
      POSTGRES_USER: ${CHAT_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CHAT_POSTGRES_PASSWORD}
      POSTGRES_DB: ${CHAT_POSTGRES_DB}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - chat_postgres_data:/var/lib/postgresql/data

  geo-db:
    container_name: geo-db
    image: postgres:16
    environment:
      POSTGRES_USER: ${GEO_POSTGRES_USER}
      POSTGRES_PASSWORD: ${GEO_POSTGRES_PASSWORD}
      POSTGRES_DB: ${GEO_POSTGRES_DB}
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - geo_postgres_data:/var/lib/postgresql/data

  auction-db:
    container_name: auction-db
    image: postgres:16
    environment:
      POSTGRES_USER: ${AUCTION_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUCTION_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUCTION_POSTGRES_DB}
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - auction_postgres_data:/var/lib/postgresql/data

volumes:
  listing_postgres_data:
  user_postgres_data:
  auth_postgres_data:
  seller_postgres_data:
  chat_postgres_data:
  geo_postgres_data:
  auction_postgres_data:
