services:
  search:
    build: ./code/services/search
    ports:
      - "50051:50051"
    environment:
      DATABASE_URL: ${DATABASE_URL}
  listing:
    build: ./code/services/listing
    ports:
      - "50052:50052"
    environment:
      DATABASE_URL: ${DATABASE_URL}
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
