services:
  search:
    container_name: search-service
    build:
      context: ./code/services
      dockerfile: search/Dockerfile
    ports:
      - "50051:50051"
    environment:
      DATABASE_URL: ${LISTING_DATABASE_URL}
    depends_on:
      listing-db:
        condition: service_healthy
  listing:
    container_name: listing-service
    build:
      context: ./code/services
      dockerfile: listing/Dockerfile
    ports:
      - "50052:50052"
    environment:
      DATABASE_URL: ${LISTING_DATABASE_URL}
    depends_on:
      listing-db:
        condition: service_healthy
  listing-db:
    container_name: listing-db
    build:
      context: .
      dockerfile: code/setup/listing-db/Dockerfile
    environment:
      POSTGRES_USER: ${LISTING_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LISTING_POSTGRES_PASSWORD}
      POSTGRES_DB: ${LISTING_POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - listing_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${LISTING_POSTGRES_USER} -d ${LISTING_POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-db:
    container_name: auth-db
    image: postgres:16
    environment:
      POSTGRES_USER: ${AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${AUTH_POSTGRES_USER} -d ${AUTH_POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  chat-db:
    container_name: chat-db
    image: postgres:16
    environment:
      POSTGRES_USER: ${CHAT_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CHAT_POSTGRES_PASSWORD}
      POSTGRES_DB: ${CHAT_POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - chat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${CHAT_POSTGRES_USER} -d ${CHAT_POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  geo-db:
    container_name: geo-db
    image: postgres:16
    environment:
      POSTGRES_USER: ${GEO_POSTGRES_USER}
      POSTGRES_PASSWORD: ${GEO_POSTGRES_PASSWORD}
      POSTGRES_DB: ${GEO_POSTGRES_DB}
    ports:
      - "5435:5432"
    volumes:
      - geo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${GEO_POSTGRES_USER} -d ${GEO_POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  auction-db:
    container_name: auction-db
    image: postgres:16
    environment:
      POSTGRES_USER: ${AUCTION_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUCTION_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUCTION_POSTGRES_DB}
    ports:
      - "5436:5432"
    volumes:
      - auction_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${AUCTION_POSTGRES_USER} -d ${AUCTION_POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  listing_postgres_data:
  auth_postgres_data:
  chat_postgres_data:
  geo_postgres_data:
  auction_postgres_data:
