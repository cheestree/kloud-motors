apiVersion: apps/v1
kind: Deployment
metadata:
  name: seller-service
  namespace: vehicles-prod
  labels:
    app: seller-service
spec:
  replicas: 1
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 300
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: seller-service
  template:
    metadata:
      labels:
        app: seller-service
    spec:
      serviceAccountName: vehicles-workload-sa
      containers:
        - name: seller-service
          image: europe-central2-docker.pkg.dev/cn-project-491618/vehicles/seller
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50057
              name: grpc
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: seller-secrets
                  key: SELLER_DATABASE_URL
            - name: LISTING_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: seller-secrets
                  key: LISTING_DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: grpc
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0
          args:
            - "--structured-logs"
            - "--port=5432"
            - "$(CLOUD_SQL_INSTANCE)"
          env:
            - name: CLOUD_SQL_INSTANCE
              valueFrom:
                secretKeyRef:
                  name: cloudsql-config
                  key: instance-connection-name
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
