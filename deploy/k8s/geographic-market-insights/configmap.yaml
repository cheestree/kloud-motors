apiVersion: v1
kind: ConfigMap
metadata:
  name: geo-config
  namespace: vehicles-prod
data:
  GEO_GRPC_PORT: "50053"
  POSTGRES_SCHEMA: "public"
  POSTGRES_TABLE: "automotive_data"
  DEFAULT_LIMIT: "20"
  MAX_LIMIT: "100"
  DB_MAX_OPEN_CONNS: "12"
  DB_MAX_IDLE_CONNS: "6"
  DB_MIN_IDLE_CONNS: "3"
  DB_CONN_MAX_LIFETIME_SECONDS: "240"
  DB_CONN_MAX_IDLE_TIME_SECONDS: "90"
