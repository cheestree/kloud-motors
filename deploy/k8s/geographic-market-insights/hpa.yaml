apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: geo-hpa
  namespace: vehicles-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: geographic-market-insights-service
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
