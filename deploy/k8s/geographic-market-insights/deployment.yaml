apiVersion: apps/v1
kind: Deployment
metadata:
  name: geographic-market-insights
  namespace: vehicles-prod
  labels:
    app: geographic-market-insights
spec:
  replicas: 2
  selector:
    matchLabels:
      app: geographic-market-insights
  template:
    metadata:
      labels:
        app: geographic-market-insights
    spec:
      serviceAccountName: vehicles-workload-sa
      containers:
        - name: geographic-market-insights
          image: europe-central2-docker.pkg.dev/cn-project-491618/vehicles/geographic-market-insights
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50053
          env:
            - name: GEO_GRPC_PORT
              value: "50053"
            - name: GEO_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: geo-secrets
                  key: postgres-dsn
            - name: POSTGRES_SCHEMA
              value: "public"
            - name: POSTGRES_TABLE
              value: "automotive_data"
            - name: DEFAULT_LIMIT
              value: "20"
            - name: MAX_LIMIT
              value: "100"

          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 20

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0
          args:
            - "--structured-logs"
            - "--port=5432"
            - "$(CLOUD_SQL_INSTANCE)"
          env:
            - name: CLOUD_SQL_INSTANCE
              valueFrom:
                secretKeyRef:
                  name: cloudsql-config
                  key: instance-connection-name
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
