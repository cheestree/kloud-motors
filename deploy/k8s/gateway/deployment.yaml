apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  labels:
    app: gateway-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      serviceAccountName: vehicles-workload-sa
      containers:
        - name: gateway-service
          image: europe-central2-docker.pkg.dev/cn-project-491618/vehicles/gateway
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            # JWT — segredo partilhado com o auth service
            - name: JWT_PUBLIC_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: JWT_PUBLIC_KEY_B64

            # Endereços gRPC dos microserviços (ClusterIP internos)
            - name: AUTH_GRPC_ADDR
              value: "auth-service:50050"
            - name: AUCTION_GRPC_ADDR
              value: "auction:50051"
            - name: CHAT_GRPC_ADDR
              value: "chat:50052"
            - name: GEO_GRPC_ADDR
              value: "geographic-market-insights:50053"
            - name: LISTING_GRPC_ADDR
              value: "listing-service:50054"
            - name: MARKETPRICE_GRPC_ADDR
              value: "marketprice:50055"
            - name: SEARCH_GRPC_ADDR
              value: "search-service:50056"
            - name: SELLER_GRPC_ADDR
              value: "seller-service:50057"
            - name: USER_GRPC_ADDR
              value: "user-service:50058"

            # Endereço HTTP/WS do chat service e auction service
            - name: CHAT_WS_ADDR
              value: "chat:8080"
            - name: AUCTION_WS_ADDR
              value: "auction:8081"

          readinessProbe:
            httpGet:
              path: api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
