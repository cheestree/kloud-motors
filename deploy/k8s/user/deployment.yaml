apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: vehicles-prod
  labels:
    app: user-service
spec:
  replicas: 1
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 300
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      serviceAccountName: vehicles-workload-sa
      containers:
        - name: user-service
          image: europe-central2-docker.pkg.dev/cn-project-491618/vehicles/user
          imagePullPolicy: Always
          ports:
            - containerPort: 50058
              name: grpc
          env:
            - name: USER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: user-secrets
                  key: USER_DATABASE_URL
            - name: FIREBASE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: user-secrets
                  key: FIREBASE_API_KEY
          envFrom:
            - configMapRef:
                name: user-config
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            grpc:
              port: 50058
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            grpc:
              port: 50058
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 50058
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0
          args:
            - "--structured-logs"
            - "--port=5432"
            - "--health-check"
            - "--http-address=0.0.0.0"
            - "$(CLOUD_SQL_INSTANCE)"
          env:
            - name: CLOUD_SQL_INSTANCE
              valueFrom:
                secretKeyRef:
                  name: cloudsql-config
                  key: instance-connection-name
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /startup
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /liveness
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
