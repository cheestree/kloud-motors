apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
  labels:
    app: chat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat
  template:
    metadata:
      labels:
        app: chat
    spec:
      serviceAccountName: chat-sa
      containers:
        - name: chat
          image: gcr.io/PROJECT_ID/chat:latest
          ports:
            - name: grpc
              containerPort: 50052
            - name: ws
              containerPort: 8080
          env:
            - name: POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: chat-secrets
                  key: gcp-project-id
            - name: GCP_PUBSUB_TOPIC
              value: "chat-events"
            - name: GCP_PUBSUB_SUBSCRIPTION
              value: "chat-sub-$(POD_ID)"
            - name: GCP_PUBSUB_AUTOCREATE
              value: "true"

            - name: FIREBASE_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: chat-secrets
                  key: gcp-project-id
            - name: FIRESTORE_MESSAGES_COLLECTION
              value: "messages"

            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: chat-secrets
                  key: postgres-dsn
            - name: POSTGRES_SCHEMA
              value: "chat-db"
            - name: POSTGRES_TABLE
              value: "chat"

            - name: LISTING_SERVICE_ADDR
              value: "listing-service:50052"
            - name: SELLER_SERVICE_ADDR
              value: "seller-service:50057"

            - name: CHAT_HISTORY_LIMIT
              value: "50"

          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 20

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
