apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-config
  namespace: vehicles-prod
data:
  GCP_PUBSUB_AUTOCREATE: "true"
  GCP_PUBSUB_TOPIC: chat-events
  POSTGRES_SCHEMA: "chat-db"
  POSTGRES_TABLE: "chat"
  FIRESTORE_DATABASE_ID: message-db
  FIRESTORE_MESSAGES_COLLECTION: messages
  LISTING_SERVICE_ADDR: listing-service:50054
  SELLER_SERVICE_ADDR: seller-service:50057
  CHAT_HISTORY_LIMIT: "50"
  DB_MAX_OPEN_CONNS: "4"
  DB_MAX_IDLE_CONNS: "2"
  DB_MIN_IDLE_CONNS: "1"
  DB_CONN_MAX_LIFETIME_SECONDS: "300"
  DB_CONN_MAX_IDLE_TIME_SECONDS: "120"
