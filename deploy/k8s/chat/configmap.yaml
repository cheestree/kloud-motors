apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-config
  namespace: vehicles-prod
data:
  GCP_PUBSUB_AUTOCREATE: "true"
  GCP_PUBSUB_TOPIC: chat-events
  GCP_PUBSUB_SUBSCRIPTION: chat-sub-$(POD_ID)
  FIRESTORE_MESSAGES_COLLECTION: messages
  LISTING_SERVICE_ADDR: listing-service:50054
  SELLER_SERVICE_ADDR: seller-service:50057
  CHAT_HISTORY_LIMIT: "50"
  POD_ID: $(POD_ID)