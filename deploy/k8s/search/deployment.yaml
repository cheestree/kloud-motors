apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: vehicles-prod
  labels:
    app: search-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      serviceAccountName: vehicles-workload-sa
      containers:
        - name: search-service
          image: europe-central2-docker.pkg.dev/cn-project-491618/vehicles/search
          imagePullPolicy: Always
          ports:
            - containerPort: 50056
              name: grpc
          env:
            - name: LISTING_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: search-secrets
                  key: LISTING_DATABASE_URL
          envFrom:
            - configMapRef:
                name: search-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            grpc:
              port: 50056
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 50056
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0
          args:
            - "--structured-logs"
            - "--port=5432"
            - "--health-check"
            - "--http-address=0.0.0.0"
            - "$(CLOUD_SQL_INSTANCE)"
          env:
            - name: CLOUD_SQL_INSTANCE
              valueFrom:
                secretKeyRef:
                  name: cloudsql-config
                  key: instance-connection-name
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /startup
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /liveness
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
