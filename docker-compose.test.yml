services:
  listing-db-test:
    image: postgres:16
    environment:
      POSTGRES_USER: listing_user
      POSTGRES_PASSWORD: listing_password
      POSTGRES_DB: listing_db
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - listing_postgres_data_test:/var/lib/postgresql/data

  user-db-test:
    image: postgres:16
    environment:
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: user_password
      POSTGRES_DB: user_db
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - user_postgres_data_test:/var/lib/postgresql/data

  seller-db-test:
    image: postgres:16
    environment:
      POSTGRES_USER: seller_user
      POSTGRES_PASSWORD: seller_password
      POSTGRES_DB: seller_db
    ports:
      - "15437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - seller_postgres_data_test:/var/lib/postgresql/data

  redis-cache-test:
    build:
      context: ./code/services
      dockerfile: redis/Dockerfile
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  listing-seed-test:
    image: python:3.12-slim
    working_dir: /workspace/code/setup
    volumes:
      - ./:/workspace
    environment:
      LISTING_PYTHON_DATABASE_URL: postgresql://listing_user:listing_password@listing-db-test:5432/listing_db?sslmode=disable
    depends_on:
      listing-db-test:
        condition: service_healthy
    command: >
      bash -c "pip install pandas sqlalchemy python-dotenv psycopg2-binary --quiet &&
               python3 listing-db/load_listings.py --dataset /workspace/code/setup/dataset_prepared.csv"
    restart: "no"

  seller-seed-test:
    image: python:3.12-slim
    working_dir: /workspace/code/setup
    volumes:
      - ./:/workspace
    environment:
      SELLER_PYTHON_DATABASE_URL: postgresql://seller_user:seller_password@seller-db-test:5432/seller_db?sslmode=disable
    depends_on:
      seller-db-test:
        condition: service_healthy
    command: >
      bash -c "pip install pandas sqlalchemy python-dotenv psycopg2-binary --quiet &&
               python3 seller-db/load_sellers.py --dataset /workspace/code/setup/users_prepared.csv"
    restart: "no"

  listing-test:
    build:
      context: ./code/services
      dockerfile: listing/Dockerfile
    ports:
      - "15054:50054"
    environment:
      LISTING_DATABASE_URL: postgres://listing_user:listing_password@listing-db-test:5432/listing_db?sslmode=disable
      LISTING_GRPC_PORT: "50054"
      REDIS_HOST: redis-cache-test
      REDIS_PORT: "6379"
    depends_on:
      listing-db-test:
        condition: service_healthy
      redis-cache-test:
        condition: service_healthy
      listing-seed-test:
        condition: service_completed_successfully

  search-test:
    build:
      context: ./code/services
      dockerfile: search/Dockerfile
    ports:
      - "15056:50056"
    environment:
      LISTING_DATABASE_URL: postgres://listing_user:listing_password@listing-db-test:5432/listing_db?sslmode=disable
      SEARCH_GRPC_PORT: "50056"
      REDIS_HOST: redis-cache-test
      REDIS_PORT: "6379"
      SEARCH_CACHE_TTL_SECONDS: "300"
    depends_on:
      listing-db-test:
        condition: service_healthy
      redis-cache-test:
        condition: service_healthy
      listing-seed-test:
        condition: service_completed_successfully

  geo-test:
    build:
      context: ./code/services
      dockerfile: geographic-market-insights/Dockerfile
    ports:
      - "15053:50053"
    environment:
      GEO_DATABASE_URL: postgres://listing_user:listing_password@listing-db-test:5432/listing_db?sslmode=disable
      GEO_GRPC_PORT: "50053"
      POSTGRES_SCHEMA: public
      POSTGRES_TABLE: automotive_data
      DEFAULT_LIMIT: "20"
      MAX_LIMIT: "100"
    depends_on:
      listing-db-test:
        condition: service_healthy
      listing-seed-test:
        condition: service_completed_successfully

  marketprice-test:
    build:
      context: ./code/services
      dockerfile: marketprice/Dockerfile
    ports:
      - "15055:50055"
    environment:
      LISTING_DATABASE_URL: postgres://listing_user:listing_password@listing-db-test:5432/listing_db?sslmode=disable
      MARKETPRICE_GRPC_PORT: "50055"
    depends_on:
      listing-db-test:
        condition: service_healthy
      listing-seed-test:
        condition: service_completed_successfully

  seller-test:
    build:
      context: ./code/services
      dockerfile: seller/Dockerfile
    ports:
      - "15057:50057"
    environment:
      SELLER_DATABASE_URL: postgres://seller_user:seller_password@seller-db-test:5432/seller_db?sslmode=disable
      LISTING_DATABASE_URL: postgres://listing_user:listing_password@listing-db-test:5432/listing_db?sslmode=disable
      SELLER_GRPC_PORT: "50057"
    depends_on:
      seller-db-test:
        condition: service_healthy
      listing-db-test:
        condition: service_healthy
      listing-seed-test:
        condition: service_completed_successfully
      seller-seed-test:
        condition: service_completed_successfully

  user-test:
    build:
      context: ./code/services
      dockerfile: user/Dockerfile
    ports:
      - "15058:50058"
    environment:
      USER_DATABASE_URL: postgres://user_user:user_password@user-db-test:5432/user_db?sslmode=disable
      USER_GRPC_PORT: "50058"
    depends_on:
      user-db-test:
        condition: service_healthy

  test-runner-test:
    image: golang:1.25-alpine
    working_dir: /workspace/code/services
    volumes:
      - ./code/services:/workspace/code/services
    environment:
      LISTING_TEST_DB_URL: postgres://listing_user:listing_password@listing-db-test:5432/listing_db?sslmode=disable
      GEO_TEST_DB_URL: postgres://listing_user:listing_password@listing-db-test:5432/listing_db?sslmode=disable
      MARKETPRICE_TEST_DB_URL: postgres://listing_user:listing_password@listing-db-test:5432/listing_db?sslmode=disable
      SELLER_TEST_DB_URL: postgres://seller_user:seller_password@seller-db-test:5432/seller_db?sslmode=disable
      LISTING_TEST_ADDR: listing-test:50054
      SEARCH_TEST_ADDR: search-test:50056
      GEO_TEST_ADDR: geo-test:50053
      MARKETPRICE_TEST_ADDR: marketprice-test:50055
      SELLER_TEST_ADDR: seller-test:50057
      USER_TEST_ADDR: user-test:50058
      TEST_PACKAGES: "./listing ./search ./geographic-market-insights ./marketprice ./seller ./user"
    depends_on:
      geo-test:
        condition: service_started
      listing-test:
        condition: service_started
      marketprice-test:
        condition: service_started
      search-test:
        condition: service_started
      seller-test:
        condition: service_started
      user-test:
        condition: service_started
      listing-seed-test:
        condition: service_completed_successfully
      seller-seed-test:
        condition: service_completed_successfully
    command: >
      sh -c "apk add --no-cache netcat-openbsd >/dev/null &&
             until nc -z geo-test 50053; do sleep 1; done &&
             until nc -z listing-test 50054; do sleep 1; done &&
             until nc -z marketprice-test 50055; do sleep 1; done &&
             until nc -z search-test 50056; do sleep 1; done &&
             until nc -z seller-test 50057; do sleep 1; done &&
             until nc -z user-test 50058; do sleep 1; done &&
             packages=\"$$TEST_PACKAGES\" &&
             if [ -z \"$$packages\" ]; then packages=\"./listing ./search ./geographic-market-insights ./marketprice ./seller ./user\"; fi &&
             go test -tags=integration $$packages"

volumes:
  listing_postgres_data_test:
  seller_postgres_data_test:
  user_postgres_data_test:
