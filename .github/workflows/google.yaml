name: Build & Deploy to GKE

on:
  push:
    branches:
      - prod

permissions:
  contents: read

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GKE_CLUSTER: ${{ vars.GKE_CLUSTER_NAME }}
  GKE_ZONE: ${{ vars.GKE_CLUSTER_ZONE }}
  K8S_NAMESPACE: vehicles-prod
  ARTIFACT_REGISTRY_HOST: ${{ vars.ARTIFACT_REGISTRY_HOST }}
  ARTIFACT_REGISTRY_REPOSITORY: vehicles

jobs:
  build-and-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth
            dockerfile: auth/Dockerfile
          - service: listing
            dockerfile: listing/Dockerfile
          - service: search
            dockerfile: search/Dockerfile
          - service: user
            dockerfile: user/Dockerfile
          - service: seller
            dockerfile: seller/Dockerfile
          - service: chat
            dockerfile: chat/Dockerfile
          - service: auction
            dockerfile: auction/Dockerfile
          - service: marketprice
            dockerfile: marketprice/Dockerfile
          - service: geographic-market-insights
            dockerfile: geographic-market-insights/Dockerfile
          - service: gateway
            dockerfile: gateway/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker $ARTIFACT_REGISTRY_HOST --quiet

      - name: Build Docker image
        working-directory: code/services
        run: |
          IMAGE_URI="$ARTIFACT_REGISTRY_HOST/$PROJECT_ID/$ARTIFACT_REGISTRY_REPOSITORY/${{ matrix.service }}:latest"
          docker build -f "${{ matrix.dockerfile }}" -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Apply Kubernetes manifests
        run: kubectl apply -k deploy/k8s

      - name: Deploy to GKE
        run: |
          kubectl -n "$K8S_NAMESPACE" get deployments -o name | while read -r deployment; do
            kubectl -n "$K8S_NAMESPACE" rollout restart "$deployment"
          done

      - name: Wait for rollout
        run: |
          kubectl -n "$K8S_NAMESPACE" get deployments -o name | while read -r deployment; do
            kubectl -n "$K8S_NAMESPACE" rollout status "$deployment" --timeout=600s
          done