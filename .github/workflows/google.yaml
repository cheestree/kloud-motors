name: Build & Deploy to GKE

on:
  push:
    branches:
      - prod

permissions:
  contents: read

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GKE_CLUSTER: ${{ vars.GKE_CLUSTER_NAME }}
  GKE_ZONE: ${{ vars.GKE_CLUSTER_ZONE }}
  K8S_NAMESPACE: vehicles-prod
  ARTIFACT_REGISTRY_HOST: ${{ vars.ARTIFACT_REGISTRY_HOST }}
  ARTIFACT_REGISTRY_REPOSITORY: vehicles

jobs:
  build-and-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: listing
            dockerfile: listing/Dockerfile
          - service: search
            dockerfile: search/Dockerfile
          - service: user
            dockerfile: user/Dockerfile
          - service: seller
            dockerfile: seller/Dockerfile
          - service: chat
            dockerfile: chat/Dockerfile
          - service: auction
            dockerfile: auction/Dockerfile
          - service: marketprice
            dockerfile: marketprice/Dockerfile
          - service: geographic-market-insights
            dockerfile: geographic-market-insights/Dockerfile
          - service: gateway
            dockerfile: gateway/Dockerfile
          - service: redis
            dockerfile: redis/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Generate gRPC sources
        working-directory: code/services
        run: bash gen_proto.sh

      - name: Configure Docker
        run: |
          HOST="${ARTIFACT_REGISTRY_HOST:-europe-central2-docker.pkg.dev}"
          gcloud auth configure-docker "$HOST" --quiet

      - name: Build Docker image
        working-directory: code/services
        run: |
          HOST="${ARTIFACT_REGISTRY_HOST:-europe-central2-docker.pkg.dev}"
          IMAGE_URI="$HOST/$PROJECT_ID/$ARTIFACT_REGISTRY_REPOSITORY/${{ matrix.service }}:latest"
          docker build -f "${{ matrix.dockerfile }}" -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Get GKE credentials
        id: gke-credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}


      - name: Deploy app manifests to GKE
        env:
          KUBECONFIG: ${{ steps.gke-credentials.outputs.kubeconfig_path }}
        run: bash scripts/cloud/k8s.sh up --with-ingress

      - name: Deploy monitoring manifests to GKE
        env:
          KUBECONFIG: ${{ steps.gke-credentials.outputs.kubeconfig_path }}
        run: bash scripts/cloud/monitoring_k8s.sh up
