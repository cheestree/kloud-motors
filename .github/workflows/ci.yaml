name: CI

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

jobs:
    unit-tests:
        name: Go unit tests
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: code/services

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: code/services/go.mod
                  cache-dependency-path: code/services/go.sum

            - name: Generate protobuf files
              run: ./gen_proto.sh

            - name: Download dependencies
              run: go mod download

            - name: Run unit tests
              run: go test ./...

    integration-tests:
        name: Basic service integration tests
        runs-on: ubuntu-latest
        timeout-minutes: 25

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Generate protobuf files
              run: ./code/services/gen_proto.sh

            - name: Validate test compose file
              run: docker compose -f docker-compose.test.yml config --quiet

            - name: Run integration tests
              run: |
                  docker compose -f docker-compose.test.yml up --build \
                    --abort-on-container-exit \
                    --exit-code-from test-runner-test \
                    test-runner-test

            - name: Stop integration stack
              if: always()
              run: docker compose -f docker-compose.test.yml down --volumes --remove-orphans
